<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Hangman</h1>
        <div class="game-info">
            <p>Wrong guesses: <span id="wrong-count">0</span> / 6</p>
            <p>Category: <span id="category">General</span></p>
        </div>

        <div class="hangman-box">
            <svg id="hangman-svg" height="250" width="200">
                <!-- Gallows -->
                <line x1="60" y1="20" x2="140" y2="20" />
                <line x1="140" y1="20" x2="140" y2="50" />
                <line x1="60" y1="20" x2="60" y2="230" />
                <line x1="20" y1="230" x2="100" y2="230" />
                <!-- Body parts - hidden by default -->
                <circle cx="140" cy="70" r="20" class="body-part" />
                <line x1="140" y1="90" x2="140" y2="150" class="body-part" />
                <line x1="140" y1="110" x2="120" y2="130" class="body-part" />
                <line x1="140" y1="110" x2="160" y2="130" class="body-part" />
                <line x1="140" y1="150" x2="120" y2="180" class="body-part" />
                <line x1="140" y1="150" x2="160" y2="180" class="body-part" />
            </svg>
        </div>

        <div class="word-display" id="word-display"></div>

        <div class="keyboard" id="keyboard"></div>

        <div id="popup" class="popup">
            <div class="popup-content">
                <h2 id="popup-text"></h2>
                <p id="popup-word"></p>
                <button id="play-again">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
