<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Breakout 075</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <h1>Breakout</h1>
    <div class="stats">
      <div class="stat">Score: <span id="score">0</span></div>
      <div class="stat">Lives: <span id="lives">3</span></div>
      <div class="stat">Level: <span id="level">1</span></div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>

      <div class="overlay" id="menuScreen">
        <h2>Breakout</h2>
        <p>Break all bricks to advance</p>
        <button id="startBtn">Start Game</button>
        <p class="controls-info">Mouse / Touch / A D to move</p>
      </div>

      <div class="overlay" id="pauseScreen">
        <h2>Paused</h2>
        <button id="resumeBtn">Resume</button>
        <button id="menuBtn">Main Menu</button>
      </div>

      <div class="overlay" id="levelCompleteScreen">
        <h2>Level Complete!</h2>
        <p>Score: <span id="levelScore">0</span></p>
        <button id="nextLevelBtn">Next Level</button>
      </div>

      <div class="overlay" id="gameOverScreen">
        <h2 id="gameOverText">Game Over</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Level Reached: <span id="finalLevel">1</span></p>
        <button id="restartBtn">Play Again</button>
        <button id="menuBtn2">Main Menu</button>
      </div>
    </div>

    <div class="powerup-display" id="powerupDisplay"></div>

    <div class="mobile-controls" id="mobileControls">
      <button class="control-btn" id="leftBtn">◀</button>
      <button class="control-btn" id="rightBtn">▶</button>
      <button class="control-btn pause-btn" id="pauseBtn">⏸</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
