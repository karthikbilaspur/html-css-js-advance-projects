<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>052-animated-weather-dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Weather Dashboard</h1>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search city...">
                <button id="searchBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
                <button id="locationBtn" title="Use my location">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 2v3m0 14v3M2 12h3m14 0h3"></path>
                    </svg>
                </button>
            </div>
        </header>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="current-weather">
                <div class="location-info">
                    <h2 id="locationName">Loading...</h2>
                    <p id="currentDate"></p>
                    <p id="description"></p>
                </div>

                <div class="temp-section">
                    <div class="weather-icon" id="weatherIcon"></div>
                    <div class="temp-details">
                        <div class="current-temp">
                            <span id="temperature">--</span>
                            <span class="unit">°C</span>
                        </div>
                        <div class="feels-like">
                            Feels like <span id="feelsLike">--</span>°C
                        </div>
                    </div>
                </div>

                <div class="weather-stats">
                    <div class="stat-item">
                        <div class="stat-icon">💧</div>
                        <div class="stat-info">
                            <span class="stat-value" id="humidity">--%</span>
                            <span class="stat-label">Humidity</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon">💨</div>
                        <div class="stat-info">
                            <span class="stat-value" id="windSpeed">-- km/h</span>
                            <span class="stat-label">Wind</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon">🌧️</div>
                        <div class="stat-info">
                            <span class="stat-value" id="precipitation">-- mm</span>
                            <span class="stat-label">Rain</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon">☀️</div>
                        <div class="stat-info">
                            <span class="stat-value" id="uvIndex">--</span>
                            <span class="stat-label">UV Index</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="chart-container">
                <h3>24-Hour Temperature</h3>
                <canvas id="tempChart"></canvas>
            </div>

            <div class="forecast-section">
                <h3>5-Day Forecast</h3>
                <div class="forecast-grid" id="forecastGrid"></div>
            </div>
        </div>

        <div class="error-message" id="errorMessage">
            <div class="error-icon">⚠️</div>
            <h3>Oops!</h3>
            <p id="errorText">Could not fetch weather data</p>
            <button class="btn" id="retryBtn">Try Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
