<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEA Finder - Mean Median Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>MEA Finder</h1>
        <p class="subtitle">Calculate Mean, Median, and Mode from your data set</p>

        <div class="input-section">
            <label for="numbers">Enter numbers separated by commas or spaces:</label>
            <textarea id="numbers" placeholder="Example: 5, 10, 15, 10, 20 or 5 10 15 10 20"></textarea>
            <div class="btn-group">
                <button id="calculate">Calculate MEA</button>
                <button id="clear">Clear</button>
                <button id="example">Load Example</button>
            </div>
        </div>

        <div class="results" id="results">
            <div class="result-card">
                <h3>Mean</h3>
                <p class="value" id="mean">-</p>
                <p class="desc">Average of all numbers</p>
            </div>
            <div class="result-card">
                <h3>Median</h3>
                <p class="value" id="median">-</p>
                <p class="desc">Middle value when sorted</p>
            </div>
            <div class="result-card">
                <h3>Mode</h3>
                <p class="value" id="mode">-</p>
                <p class="desc">Most frequent number</p>
            </div>
        </div>

        <div class="stats" id="stats">
            <h3>Data Summary</h3>
            <table>
                <tr>
                    <td>Count:</td>
                    <td id="count">0</td>
                </tr>
                <tr>
                    <td>Sum:</td>
                    <td id="sum">0</td>
                </tr>
                <tr>
                    <td>Min:</td>
                    <td id="min">-</td>
                </tr>
                <tr>
                    <td>Max:</td>
                    <td id="max">-</td>
                </tr>
                <tr>
                    <td>Range:</td>
                    <td id="range">-</td>
                </tr>
                <tr>
                    <td>Sorted:</td>
                    <td id="sorted">-</td>
                </tr>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
