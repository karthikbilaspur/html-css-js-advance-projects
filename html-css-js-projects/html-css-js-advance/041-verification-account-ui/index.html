<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>041-verfyication-account-ui</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="verify-card">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>

            <h2>Verify Your Account</h2>
            <p class="subtitle">We sent a 6-digit code to <strong id="email">karthik@example.com</strong></p>

            <div class="code-container" id="codeContainer">
                <input type="text" maxlength="1" class="code-input" id="code1" autofocus>
                <input type="text" maxlength="1" class="code-input" id="code2">
                <input type="text" maxlength="1" class="code-input" id="code3">
                <input type="text" maxlength="1" class="code-input" id="code4">
                <input type="text" maxlength="1" class="code-input" id="code5">
                <input type="text" maxlength="1" class="code-input" id="code6">
            </div>

            <div class="error-msg" id="errorMsg"></div>

            <button class="btn" id="verifyBtn" disabled>Verify Account</button>

            <div class="resend">
                <p>Didn't receive the code? <button class="link-btn" id="resendBtn">Resend</button></p>
                <div class="timer" id="timer">Resend in <span id="countdown">60</span>s</div>
            </div>

            <div class="success-screen" id="successScreen">
                <div class="success-icon">✓</div>
                <h2>Account Verified!</h2>
                <p>Your account has been successfully verified</p>
                <button class="btn" id="continueBtn">Continue</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
