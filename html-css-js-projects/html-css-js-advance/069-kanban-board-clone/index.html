<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Kanban Board</h1>
            <div class="stats">
                <span id="total-cards">0 cards</span>
                <button id="add-board">+ New Card</button>
            </div>
        </header>

        <div class="board" id="board">
            <div class="column" data-status="todo">
                <div class="column-header">
                    <h3>To Do</h3>
                    <span class="count" id="todo-count">0</span>
                </div>
                <div class="cards" id="todo-cards"></div>
                <button class="add-card" data-status="todo">+ Add card</button>
            </div>

            <div class="column" data-status="doing">
                <div class="column-header">
                    <h3>In Progress</h3>
                    <span class="count" id="doing-count">0</span>
                </div>
                <div class="cards" id="doing-cards"></div>
                <button class="add-card" data-status="doing">+ Add card</button>
            </div>

            <div class="column" data-status="done">
                <div class="column-header">
                    <h3>Done</h3>
                    <span class="count" id="done-count">0</span>
                </div>
                <div class="cards" id="done-cards"></div>
                <button class="add-card" data-status="done">+ Add card</button>
            </div>
        </div>
    </div>

    <!-- Add Card Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Add New Card</h3>
            <form id="card-form">
                <input type="text" id="card-title" placeholder="Card title..." required>
                <textarea id="card-desc" placeholder="Description..." rows="3"></textarea>
                <select id="card-status">
                    <option value="todo">To Do</option>
                    <option value="doing">In Progress</option>
                    <option value="done">Done</option>
                </select>
                <div class="modal-actions">
                    <button type="button" id="cancel">Cancel</button>
                    <button type="submit">Add Card</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
