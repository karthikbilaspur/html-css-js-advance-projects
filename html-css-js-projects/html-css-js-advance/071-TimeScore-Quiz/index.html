<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App with Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1>JavaScript Quiz</h1>
            <p>Test your knowledge. 5 questions, 30 seconds each.</p>
            <div class="settings">
                <label>Category:
                    <select id="category-select">
                        <option value="all">All Topics</option>
                        <option value="basics">JS Basics</option>
                        <option value="dom">DOM</option>
                        <option value="arrays">Arrays</option>
                    </select>
                </label>
            </div>
            <button id="start-btn">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="progress">
                    Question <span id="current-q">1</span> / <span id="total-q">5</span>
                </div>
                <div class="timer">
                    <svg class="timer-svg">
                        <circle class="timer-bg" cx="30" cy="30" r="25"></circle>
                        <circle class="timer-progress" id="timer-circle" cx="30" cy="30" r="25"></circle>
                    </svg>
                    <span id="time-left">30</span>
                </div>
                <div class="score">
                    Score: <span id="score">0</span>
                </div>
            </div>

            <div class="question-box">
                <h2 id="question"></h2>
                <div id="options" class="options"></div>
            </div>

            <button id="next-btn" class="next-btn" disabled>Next Question</button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <h1>Quiz Complete!</h1>
            <div class="result-stats">
                <div class="stat">
                    <p class="stat-value" id="final-score">0</p>
                    <p class="stat-label">Final Score</p>
                </div>
                <div class="stat">
                    <p class="stat-value" id="percentage">0%</p>
                    <p class="stat-label">Accuracy</p>
                </div>
                <div class="stat">
                    <p class="stat-value" id="correct-count">0/5</p>
                    <p class="stat-label">Correct</p>
                </div>
            </div>
            <div id="feedback" class="feedback"></div>
            <div class="result-buttons">
                <button id="restart-btn">Play Again</button>
                <button id="review-btn">Review Answers</button>
            </div>
            <div id="review-section" class="review-section"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
