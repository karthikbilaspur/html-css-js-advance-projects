<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Invaders 084</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <h1>SPACE INVADERS</h1>
    <div class="stats">
      <div class="stat">Score: <span id="score">0</span></div>
      <div class="stat">Lives: <span id="lives">3</span></div>
      <div class="stat">Wave: <span id="wave">1</span></div>
      <div class="stat">Best: <span id="best">0</span></div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>

      <div class="overlay" id="menuScreen">
        <h2>SPACE INVADERS</h2>
        <p>Defend Earth from the alien horde</p>
        <button id="startBtn">Start Game</button>
        <div class="controls-info">
          <p>A D / ← → Move | Space / W Shoot</p>
          <p>Mobile: Touch buttons</p>
        </div>
      </div>

      <div class="overlay" id="gameOverScreen">
        <h2 id="gameOverText">Game Over</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Wave Reached: <span id="finalWave">1</span></p>
        <button id="restartBtn">Play Again</button>
        <button id="menuBtn">Main Menu</button>
      </div>

      <div class="overlay" id="waveScreen">
        <h2>Wave <span id="waveNum">2</span></h2>
        <p>Get Ready!</p>
      </div>
    </div>

    <div class="mobile-controls" id="mobileControls">
      <button class="control-btn" id="leftBtn">◀</button>
      <button class="control-btn fire-btn" id="fireBtn">●</button>
      <button class="control-btn" id="rightBtn">▶</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
