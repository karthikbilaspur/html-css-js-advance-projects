<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hidden Search | KarthikCodingSolutions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <span class="logo">⚡</span>
        <span>KarthikCodingSolutions</span>
      </div>
      <p>Project 004: Hidden Search Widget</p>
    </header>

    <div class="search-wrapper">
      <div class="search" id="search">
        <input type="text" class="input" placeholder="Search projects..." id="input">
        <button class="btn" id="btn">
          <i class="fas fa-search"></i>
        </button>
      </div>
      <p class="hint">Click the icon to toggle search</p>
    </div>

    <div class="results" id="results">
      <!-- JS will show results here -->
    </div>

    <footer>
      <p>&copy; 2026 KarthikCodingSolutions</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
