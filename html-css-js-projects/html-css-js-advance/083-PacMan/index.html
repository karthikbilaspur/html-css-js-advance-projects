<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pac-Man 083</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <h1>PAC-MAN</h1>
    <div class="stats">
      <div class="stat">Score: <span id="score">0</span></div>
      <div class="stat">Lives: <span id="lives">3</span></div>
      <div class="stat">Level: <span id="level">1</span></div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>

      <div class="overlay" id="menuScreen">
        <h2>PAC-MAN</h2>
        <p>Avoid ghosts, eat all dots</p>
        <button id="startBtn">Start Game</button>
        <div class="controls-info">
          <p>WASD / Arrow Keys Move</p>
          <p>Mobile: Swipe or use buttons</p>
        </div>
      </div>

      <div class="overlay" id="gameOverScreen">
        <h2 id="gameOverText">Game Over</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Best: <span id="bestScore">0</span></p>
        <button id="restartBtn">Play Again</button>
        <button id="menuBtn">Main Menu</button>
      </div>

      <div class="overlay" id="levelScreen">
        <h2>Level <span id="levelNum">2</span></h2>
        <p>Ready!</p>
      </div>
    </div>

    <div class="mobile-controls" id="mobileControls">
      <button class="control-btn" id="upBtn">▲</button>
      <div class="h-controls">
        <button class="control-btn" id="leftBtn">◀</button>
        <button class="control-btn" id="rightBtn">▶</button>
      </div>
      <button class="control-btn" id="downBtn">▼</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
