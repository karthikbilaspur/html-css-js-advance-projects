<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Art Editor - 094</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>PIXEL ART <span class="project-num">094</span></h1>
      <div class="stats">
        <div class="stat">Size: <span id="canvasSize">16x16</span></div>
        <div class="stat">Zoom: <span id="zoomLevel">20x</span></div>
        <div class="stat">Tool: <span id="currentTool">Brush</span></div>
      </div>
    </header>

    <div class="main-layout">
      <div class="toolbar">
        <h3>Tools</h3>
        <button class="tool-btn active" data-tool="brush">🖌️ Brush</button>
        <button class="tool-btn" data-tool="eraser">🧹 Eraser</button>
        <button class="tool-btn" data-tool="fill">🪣 Fill</button>
        <button class="tool-btn" data-tool="eyedropper">💧 Picker</button>

        <h3>Color</h3>
        <input type="color" id="colorPicker" value="#000000">
        <div class="palette" id="palette"></div>

        <h3>Canvas</h3>
        <select id="sizeSelect">
          <option value="8">8 x 8</option>
          <option value="16" selected>16 x 16</option>
          <option value="32">32 x 32</option>
          <option value="64">64 x 64</option>
        </select>
        <button id="clearBtn">Clear</button>
        <button id="gridBtn">Toggle Grid</button>

        <h3>Export</h3>
        <button id="savePngBtn">Save PNG</button>
        <button id="saveDataBtn">Copy Data</button>
      </div>

      <div class="canvas-wrapper">
        <canvas id="pixelCanvas"></canvas>
        <div class="canvas-info">Click and drag to draw</div>
      </div>

      <div class="preview-panel">
        <h3>Preview</h3>
        <canvas id="previewCanvas" width="128" height="128"></canvas>
        <div class="preview-size">128x128</div>
        
        <h3>Layers</h3>
        <div class="layers">
          <div class="layer active">Layer 1</div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
