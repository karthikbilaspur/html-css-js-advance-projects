<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>057-countdown-timer-confetti</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="confettiCanvas"></canvas>

    <div class="container">
        <header>
            <h1>🎉 Countdown Timer</h1>
            <p>Set timers and celebrate with confetti</p>
            <div class="theme-switcher">
                <button class="theme-btn active" data-theme="dark">Dark</button>
                <button class="theme-btn" data-theme="light">Light</button>
                <button class="theme-btn" data-theme="neon">Neon</button>
                <button class="theme-btn" data-theme="sunset">Sunset</button>
            </div>
        </header>

        <div class="add-timer-card">
            <h2>Create New Timer</h2>
            <form id="timerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="timerTitle">Event Name</label>
                        <input type="text" id="timerTitle" placeholder="New Year 2027" maxlength="50" required>
                    </div>
                    <div class="form-group">
                        <label for="timerDate">Target Date</label>
                        <input type="date" id="timerDate" required>
                    </div>
                    <div class="form-group">
                        <label for="timerTime">Target Time</label>
                        <input type="time" id="timerTime" required>
                    </div>
                </div>
                <button type="submit" class="btn-add">Add Timer</button>
            </form>
        </div>

        <div class="timers-grid" id="timersGrid">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">⏰</div>
                <h3>No timers yet</h3>
                <p>Create your first countdown above</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
