<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Slider | KarthikCodingSolutions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="kcs-header">
    <div class="brand">
      <span class="logo">⚡</span>
      <span>KarthikCodingSolutions</span>
    </div>
    <p>Project 018: Background Slider</p>
  </header>

  <div class="slider-container">
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=1200&auto=format&fit=crop')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=1200&auto=format&fit=crop')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=1200&auto=format&fit=crop')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1200&auto=format&fit=crop')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200&auto=format&fit=crop')"></div>

    <button class="arrow left-arrow" id="left">
      <i class="fas fa-arrow-left"></i>
    </button>

    <button class="arrow right-arrow" id="right">
      <i class="fas fa-arrow-right"></i>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
