<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100 - LifeOS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div>
      <h1>LifeOS</h1>
      <div id="date"></div>
    </div>
    <div class="stats">
      <div class="stat-pill">🔥 <span id="streak">0</span></div>
      <div class="stat-pill">⚡ <span id="score">0</span></div>
      <div class="stat-pill">💰 <span id="net">₹0</span></div>
    </div>
  </header>

  <nav>
    <button data-v="home" class="active">Home</button>
    <button data-v="habits">Habits</button>
    <button data-v="focus">Focus</button>
    <button data-v="money">Money</button>
  </nav>

  <main>
    <!-- HOME -->
    <section id="home" class="v active">
      <div class="card">
        <h2>Today's Mission</h2>
        <div id="today-blocks"></div>
        <div class="quick-actions">
          <button onclick="OS.quick('habit')">+ Habit</button>
          <button onclick="OS.quick('expense')">+ Expense</button>
          <button onclick="OS.quick('focus')">+ Focus</button>
        </div>
      </div>
      <div class="grid-2">
        <div class="card">
          <h3>Deep Work</h3>
          <div class="ring" id="deep-ring"><span>0h</span></div>
        </div>
        <div class="card">
          <h3>Budget</h3>
          <div class="ring" id="budget-ring"><span>0%</span></div>
        </div>
      </div>
    </section>

    <!-- HABITS -->
    <section id="habits" class="v">
      <div class="card">
        <form id="habit-add">
          <input id="h-name" placeholder="Habit name" required>
          <select id="h-type"><option>Daily</option><option>Weekly</option></select>
          <input id="h-goal" type="number" value="1" min="1">
          <button>Add</button>
        </form>
      </div>
      <div id="habit-list"></div>
    </section>

    <!-- FOCUS -->
    <section id="focus" class="v">
      <div class="card focus-card">
        <div id="focus-task">Select a block to start</div>
        <div class="timer" id="timer">00:00</div>
        <div class="focus-ctrl">
          <button id="focus-start">Start</button>
          <button id="focus-stop" disabled>Stop</button>
          <button id="focus-distract" class="danger">Distracted</button>
        </div>
      </div>
      <div class="card">
        <h3>Timeblocks</h3>
        <form id="block-add">
          <input id="b-task" placeholder="Task" required>
          <select id="b-type"><option>Deep</option><option>Shallow</option><option>Admin</option></select>
          <input id="b-mins" type="number" value="50" min="15" step="5">
          <button>Add</button>
        </form>
        <div id="block-list"></div>
      </div>
    </section>

    <!-- MONEY -->
    <section id="money" class="v">
      <div class="card">
        <h3>Quick Add</h3>
        <div class="quick-grid" id="quick-expense"></div>
        <form id="expense-add">
          <input id="e-amt" type="number" step="0.01" placeholder="Amount" required>
          <select id="e-cat"></select>
          <input id="e-note" placeholder="Note">
          <button>Add</button>
        </form>
      </div>
      <div class="card">
        <h3>Budgets</h3>
        <form id="budget-add">
          <select id="b-cat"></select>
          <input id="b-limit" type="number" placeholder="Limit" required>
          <button>Set</button>
        </form>
        <div id="budget-list"></div>
      </div>
    </section>
  </main>

  <!-- QUICK MODAL -->
  <dialog id="modal">
    <form id="modal-form">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button type="button" onclick="modal.close()">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
