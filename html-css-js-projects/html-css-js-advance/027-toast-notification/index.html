<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>027-toast-notification</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Toast Notifications</h1>
        <p>Click a button to show a toast</p>

        <div class="buttons">
            <button id="successBtn" class="btn success">Success</button>
            <button id="errorBtn" class="btn error">Error</button>
            <button id="infoBtn" class="btn info">Info</button>
            <button id="warningBtn" class="btn warning">Warning</button>
        </div>
    </div>

    <!-- Toast container gets injected here -->
    <div id="toasts"></div>

    <script src="script.js"></script>
</body>
</html>
