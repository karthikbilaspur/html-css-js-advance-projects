<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pong 074</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <h1>Pong</h1>
    <div class="score-board">
      <div class="score">You: <span id="playerScore">0</span></div>
      <div class="score">CPU: <span id="cpuScore">0</span></div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>

      <div class="overlay" id="menuScreen">
        <h2>Pong</h2>
        <p>First to 7 wins</p>
        <button id="startBtn">Start Game</button>
        <p class="controls-info">Move: Mouse / Touch / W S</p>
      </div>

      <div class="overlay" id="gameOverScreen">
        <h2 id="winnerText">You Win!</h2>
        <p>Final: <span id="finalScore">0 - 0</span></p>
        <button id="restartBtn">Play Again</button>
        <button id="menuBtn">Main Menu</button>
      </div>
    </div>

    <div class="mobile-controls" id="mobileControls">
      <button class="control-btn" id="upBtn">▲</button>
      <button class="control-btn" id="downBtn">▼</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
