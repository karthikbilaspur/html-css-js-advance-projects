<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>035-image-carousel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="carousel-container">
        <h1>Image Carousel</h1>

        <div class="carousel" id="carousel">
            <div class="carousel-track" id="track">
                <div class="slide active">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800" alt="Mountain Lake">
                    <div class="slide-caption">
                        <h3>Mountain Lake</h3>
                        <p>Peaceful waters surrounded by peaks</p>
                    </div>
                </div>
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=800" alt="City Skyline">
                    <div class="slide-caption">
                        <h3>City Skyline</h3>
                        <p>Urban lights at dusk</p>
                    </div>
                </div>
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=800" alt="Forest Path">
                    <div class="slide-caption">
                        <h3>Forest Path</h3>
                        <p>A walk through autumn woods</p>
                    </div>
                </div>
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1505144808419-1957a94ca61e?w=800" alt="Ocean Waves">
                    <div class="slide-caption">
                        <h3>Ocean Waves</h3>
                        <p>Crashing against the shore</p>
                    </div>
                </div>
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800" alt="Desert Dunes">
                    <div class="slide-caption">
                        <h3>Desert Dunes</h3>
                        <p>Golden sand at sunrise</p>
                    </div>
                </div>
            </div>

            <button class="carousel-btn prev" id="prevBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <button class="carousel-btn next" id="nextBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>

        <div class="carousel-dots" id="dots"></div>

        <div class="autoplay-control">
            <button class="btn" id="playPauseBtn">Pause</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
