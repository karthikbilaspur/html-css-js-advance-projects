<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code 90 - Multi-Step Form Advanced</title>
    <link rel="stylesheet" href="code90.css">
</head>
<body>
  <main>
    <h1 class="page-title">Advanced Multi-Step Form</h1>
    
    <section class="form-section">
      <h2>Checkout Process</h2>
      <p class="description">Step-by-step checkout with visual progress tracking</p>
      
      <form class="multistep-form">
        <input type="radio" id="step-1" name="step" checked>
        <input type="radio" id="step-2" name="step">
        <input type="radio" id="step-3" name="step">

        <div class="progress-container">
          <div class="progress-line-bg"></div>
          <div class="progress-line-fill"></div>
          <div class="step-indicators">
            <label for="step-1" class="step-indicator">
              <div class="step-circle">
                <span class="step-num">1</span>
                <span class="step-check">✓</span>
              </div>
              <span class="step-text">Shipping</span>
            </label>
            
            <label for="step-2" class="step-indicator">
              <div class="step-circle">
                <span class="step-num">2</span>
                <span class="step-check">✓</span>
              </div>
              <span class="step-text">Payment</span>
            </label>
            
            <label for="step-3" class="step-indicator">
              <div class="step-circle">
                <span class="step-num">3</span>
                <span class="step-check">✓</span>
              </div>
              <span class="step-text">Confirm</span>
            </label>
          </div>
        </div>

        <div class="form-panels">
          <div class="form-panel panel-1">
            <h3>Shipping Information</h3>
            <div class="form-row">
              <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="John">
              </div>
              <div class="form-group">
                <label>Last Name</label>
                <input type="text" placeholder="Doe">
              </div>
            </div>
            <div class="form-group">
              <label>Address</label>
              <input type="text" placeholder="123 Main Street">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>City</label>
                <input type="text" placeholder="Bangalore">
              </div>
              <div class="form-group">
                <label>Zip Code</label>
                <input type="text" placeholder="560001">
              </div>
            </div>
            <div class="form-actions">
              <div></div>
              <label for="step-2" class="btn btn-primary">Continue to Payment</label>
            </div>
          </div>

          <div class="form-panel panel-2">
            <h3>Payment Method</h3>
            <div class="payment-options">
              <label class="payment-option">
                <input type="radio" name="payment" checked>
                <div class="payment-card">
                  <span class="payment-icon">💳</span>
                  <span>Credit Card</span>
                </div>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment">
                <div class="payment-card">
                  <span class="payment-icon">📱</span>
                  <span>UPI</span>
                </div>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment">
                <div class="payment-card">
                  <span class="payment-icon">🏦</span>
                  <span>Net Banking</span>
                </div>
              </label>
            </div>
            <div class="form-group">
              <label>Card Number</label>
              <input type="text" placeholder="1234 5678 9012 3456">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Expiry</label>
                <input type="text" placeholder="MM/YY">
              </div>
              <div class="form-group">
                <label>CVV</label>
                <input type="text" placeholder="123">
              </div>
            </div>
            <div class="form-actions">
              <label for="step-1" class="btn btn-secondary">Back</label>
              <label for="step-3" class="btn btn-primary">Review Order</label>
            </div>
          </div>

          <div class="form-panel panel-3">
            <h3>Order Confirmation</h3>
            <div class="order-summary">
              <div class="summary-row">
                <span>Subtotal</span>
                <span>₹2,499</span>
              </div>
              <div class="summary-row">
                <span>Shipping</span>
                <span>₹99</span>
              </div>
              <div class="summary-row">
                <span>Tax</span>
                <span>₹250</span>
              </div>
              <div class="summary-row total">
                <span>Total</span>
                <span>₹2,848</span>
              </div>
            </div>
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" checked>
                <span>I agree to terms and conditions</span>
              </label>
            </div>
            <div class="form-actions">
              <label for="step-2" class="btn btn-secondary">Back</label>
              <button type="submit" class="btn btn-success">Place Order</button>
            </div>
          </div>
        </div>
      </form>
    </section>
    
    <nav>
      <hr>
      <p>
        <a href="../code89/code89.html">← Prev: Code 89</a> | 
        <a href="../index.html">Home</a> | 
        <a href="../code91/code91.html">Next: Code 91 →</a>
      </p>
    </nav>
  </main>

  <footer>
    <hr>
    <p><small>Code 90 of 99 | HTML 100 Codes Vault</small></p>
  </footer>
</body>
</html>
