<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code 84 - Star Rating</title>
    <link rel="stylesheet" href="code84.css">
</head>
<body>
  <main>
    <h1 class="page-title">CSS Star Rating</h1>
    
    <section class="rating-section">
      <h2>Rate This Product</h2>
      <p class="description">Click stars to rate. Uses radio + <code>:checked</code></p>
      
      <div class="star-rating">
        <input type="radio" id="star5" name="rating" value="5">
        <label for="star5" title="5 stars">★</label>
        
        <input type="radio" id="star4" name="rating" value="4">
        <label for="star4" title="4 stars">★</label>
        
        <input type="radio" id="star3" name="rating" value="3">
        <label for="star3" title="3 stars">★</label>
        
        <input type="radio" id="star2" name="rating" value="2">
        <label for="star2" title="2 stars">★</label>
        
        <input type="radio" id="star1" name="rating" value="1">
        <label for="star1" title="1 star">★</label>
      </div>
      
      <p class="rating-text">Select your rating</p>
    </section>

    <section class="rating-section">
      <h2>Pre-selected Rating</h2>
      <p class="description">Default 4-star rating</p>
      
      <div class="star-rating">
        <input type="radio" id="star5b" name="rating-b" value="5">
        <label for="star5b" title="5 stars">★</label>
        
        <input type="radio" id="star4b" name="rating-b" value="4" checked>
        <label for="star4b" title="4 stars">★</label>
        
        <input type="radio" id="star3b" name="rating-b" value="3">
        <label for="star3b" title="3 stars">★</label>
        
        <input type="radio" id="star2b" name="rating-b" value="2">
        <label for="star2b" title="2 stars">★</label>
        
        <input type="radio" id="star1b" name="rating-b" value="1">
        <label for="star1b" title="1 star">★</label>
      </div>
    </section>
    
    <nav>
      <hr>
      <p>

        <a href="../index.html">Home</a> | 
        <a href="../code85/code85.html">Next: Code 85 →</a>
      </p>
    </nav>
  </main>

  <footer>
    <hr>
    <p><small>Code 84 of 99 | HTML 100 Codes Vault</small></p>
  </footer>
</body>
</html>
