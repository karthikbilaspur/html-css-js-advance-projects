  <main class="container">
    <h1>Monthly Revenue 2025-26</h1>
    <p class="subtitle">Bar chart built with divs + height percentages</p>
    
    <section class="chart-wrapper">

        <div class="bar-group">

          </div>

        </div>

          </div>
          <span class="x-label">Aug</span>
        </div>
      </div>
