<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code 72 - Loading Spinners</title>
    <link rel="stylesheet" href="code72.css">
</head>
<body>
    <main class="container">
        <h1 class="page-title">Loading Spinners</h1>
        <p class="subtitle">Pure CSS animations for loading states</p>
        
        <section class="spinner-section" aria-label="Classic spinner example">
            <h2>Classic Spinner</h2>
            <div class="spinner classic" role="status" aria-label="Loading">
                <span class="sr-only">Loading...</span>
            </div>
        </section>

        <section class="spinner-section" aria-label="Ring spinner example">
            <h2>Ring Spinner</h2>
            <div class="spinner ring" role="status" aria-label="Loading">
                <span class="sr-only">Loading...</span>
            </div>
        </section>

        <section class="spinner-section" aria-label="Dot spinner example">
            <h2>Dot Spinner</h2>
            <div class="spinner dots" role="status" aria-label="Loading">
                <div class="dot" aria-hidden="true"></div>
                <div class="dot" aria-hidden="true"></div>
                <div class="dot" aria-hidden="true"></div>
                <span class="sr-only">Loading...</span>
            </div>
        </section>

        <section class="spinner-section" aria-label="Pulse spinner example">
            <h2>Pulse Spinner</h2>
            <div class="spinner pulse" role="status" aria-label="Loading">
                <span class="sr-only">Loading...</span>
            </div>
        </section>

            </p>
        </nav>
    </main>

    <footer class="page-footer">
        <hr>
        <p><small>Code 72 of 99 | HTML 100 Codes Vault</small></p>
    </footer>
</body>
</html>
