<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 33: Quiz App v2 | HTML 100 Codes</title>
  <link rel="stylesheet" href="code33.css">
  <script src="code33.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 33: Quiz App v2</h1>
    <p class="subtitle">Test your knowledge</p>
  </header>

  <div class="quiz-container" id="quizContainer">
    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
      <h2>JavaScript Basics Quiz</h2>
      <p>10 questions • 5 minutes</p>
      <div class="quiz-info">
        <div class="info-item">📝 Multiple Choice</div>
        <div class="info-item">⏱️ Timed</div>
        <div class="info-item">🎯 Instant Results</div>
      </div>
      <button id="startBtn" class="primary-btn">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div class="quiz-screen" id="quizScreen" style="display: none;">
      <div class="quiz-header">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="quiz-meta">
          <span id="questionCounter">Question 1 of 10</span>
          <span id="timer">⏱️ 5:00</span>
        </div>
      </div>

      <div class="question-card">
        <h3 id="questionText">Question text here</h3>
        <div class="options" id="optionsContainer"></div>
      </div>

      <div class="navigation">
        <button id="prevBtn" class="nav-btn" disabled>← Previous</button>
        <button id="nextBtn" class="nav-btn primary-btn">Next →</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div class="result-screen" id="resultScreen" style="display: none;">
      <div class="result-icon" id="resultIcon">🎉</div>
      <h2 id="resultTitle">Quiz Complete!</h2>
      <div class="score-display">
        <div class="score-circle">
          <svg width="150" height="150">
            <circle cx="75" cy="75" r="65" class="score-bg"/>
            <circle cx="75" cy="75" r="65" class="score-progress" id="scoreProgress"/>
          </svg>
          <div class="score-text">
            <span id="scorePercent">0%</span>
          </div>
        </div>
      </div>
      <p class="score-detail" id="scoreDetail">You scored 0 out of 10</p>
      <div class="result-stats">
        <div class="stat-box">
          <span class="stat-value" id="correctCount">0</span>
          <span class="stat-label">Correct</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="wrongCount">0</span>
          <span class="stat-label">Wrong</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="timeTaken">0:00</span>
          <span class="stat-label">Time</span>
        </div>
      </div>
      <div class="result-actions">
        <button id="reviewBtn" class="secondary-btn">Review Answers</button>
        <button id="retryBtn" class="primary-btn">Try Again</button>
      </div>
    </div>

    <!-- Review Screen -->
    <div class="review-screen" id="reviewScreen" style="display: none;">
      <h2>Review Answers</h2>
      <div id="reviewList"></div>
      <button id="backToResultBtn" class="primary-btn">Back to Results</button>
    </div>
  </div>
</body>
</html>
