<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game 69</title>
    <link rel="stylesheet" href="code69.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="title">
                <h1>2048</h1>
                <p>Join tiles to get 2048!</p>
            </div>
            <div class="scores">
                <div class="score-box">
                    <div class="label">Score</div>
                    <div id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">Best</div>
                    <div id="best">0</div>
                </div>
            </div>
        </header>

        <div class="game-container">
            <div id="game-board" class="game-board">
                <div class="grid"></div>
                <div id="tile-container" class="tile-container"></div>
            </div>

            <div id="game-over" class="overlay hidden">
                <h2 id="game-over-title">Game Over</h2>
                <button id="try-again">Try Again</button>
            </div>

            <div id="game-won" class="overlay hidden">
                <h2>You Win!</h2>
                <p>Keep going to beat your score</p>
                <button id="keep-playing">Keep Playing</button>
                <button id="new-game">New Game</button>
            </div>
        </div>

        <div class="controls">
            <button id="new-game-btn">New Game</button>
            <p class="hint">Use Arrow Keys or WASD to move tiles</p>
        </div>
    </div>

    <script src="code69.js"></script>
</body>
</html>
