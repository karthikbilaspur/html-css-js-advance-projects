<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player 77</title>
    <link rel="stylesheet" href="code77.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="player">
            <div class="album-art">
                <img id="cover" src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=400&h=400&fit=crop" alt="Album Cover">
                <div class="vinyl"></div>
            </div>

            <div class="track-info">
                <h2 id="title">Lofi Study Beats</h2>
                <p id="artist">Chill Collective</p>
            </div>

            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress" min="0" max="100" value="0" step="0.1">
                <span id="duration">0:00</span>
            </div>

            <div class="controls">
                <button id="prev-btn" class="control-btn">
                    <i class="fas fa-backward-step"></i>
                </button>
                <button id="play-btn" class="control-btn play-btn">
                    <i class="fas fa-play"></i>
                </button>
                <button id="next-btn" class="control-btn">
                    <i class="fas fa-forward-step"></i>
                </button>
            </div>

            <div class="volume-control">
                <i class="fas fa-volume-low"></i>
                <input type="range" id="volume" min="0" max="100" value="70">
                <i class="fas fa-volume-high"></i>
            </div>

            <div class="extra-controls">
                <button id="shuffle-btn" class="icon-btn" title="Shuffle">
                    <i class="fas fa-shuffle"></i>
                </button>
                <button id="repeat-btn" class="icon-btn" title="Repeat">
                    <i class="fas fa-repeat"></i>
                </button>
            </div>
        </div>

        <div class="playlist">
            <h3>Playlist</h3>
            <div id="track-list" class="track-list"></div>
        </div>
    </div>

    <audio id="audio"></audio>
    <script src="code77.js"></script>
</body>
</html>
