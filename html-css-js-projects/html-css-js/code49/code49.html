<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub User Finder 49</title>
    <link rel="stylesheet" href="code49.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>GitHub User Finder</h1>
            <p>Search any GitHub username to see profile + repos</p>
        </header>

        <div class="search-box">
            <input type="text" id="username-input" placeholder="Enter GitHub username..." />
            <button id="search-btn">Search</button>
        </div>

        <div id="error-msg" class="error hidden"></div>

        <div id="user-profile" class="profile-card hidden">
            <div class="profile-header">
                <img id="avatar" src="" alt="Avatar">
                <div class="profile-info">
                    <h2 id="name"></h2>
                    <p id="username" class="username"></p>
                    <p id="bio"></p>
                    <div class="stats">
                        <span><strong id="repos-count">0</strong> Repos</span>
                        <span><strong id="followers">0</strong> Followers</span>
                        <span><strong id="following">0</strong> Following</span>
                    </div>
                    <a id="profile-link" target="_blank" class="profile-btn">View on GitHub</a>
                </div>
            </div>
        </div>

        <div id="repos-section" class="hidden">
            <div class="repos-header">
                <h3>Public Repositories</h3>
                <select id="sort-select">
                    <option value="updated">Recently Updated</option>
                    <option value="stars">Most Stars</option>
                    <option value="name">Name A-Z</option>
                </select>
            </div>
            <div id="repos-list" class="repos-grid"></div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Fetching from GitHub API...</p>
        </div>
    </div>

    <script src="code49.js"></script>
</body>
</html>
