<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird 68</title>
    <link rel="stylesheet" href="code68.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Flappy Bird</h1>
            <div class="stats">
                <div class="stat">
                    <span>Score</span>
                    <strong id="score">0</strong>
                </div>
                <div class="stat">
                    <span>Best</span>
                    <strong id="best">0</strong>
                </div>
            </div>
        </header>

        <div class="game-wrapper">
            <canvas id="game-canvas" width="400" height="600"></canvas>

            <div id="start-screen" class="overlay">
                <h2>Flappy Bird</h2>
                <p>Tap or press Space to flap</p>
                <button id="start-btn">Start Game</button>
            </div>

            <div id="game-over" class="overlay hidden">
                <h2>Game Over</h2>
                <p>Score: <span id="final-score">0</span></p>
                <p id="new-best" class="hidden">🎉 New Best!</p>
                <button id="restart-btn">Play Again</button>
            </div>
        </div>

        <div class="controls">
            <p>🖱️ Click / Tap / Space to flap</p>
        </div>
    </div>

    <script src="code68.js"></script>
</body>
</html>
