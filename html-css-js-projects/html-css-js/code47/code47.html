<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App 47</title>
    <link rel="stylesheet" href="code47.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Weather App</h1>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
                <button id="search-btn">Search</button>
                <button id="location-btn" title="Use my location">📍</button>
            </div>
        </header>

        <div id="loader" class="loader hidden"></div>
        <div id="error-msg" class="error hidden"></div>

        <div id="weather-card" class="weather-card hidden">
            <div class="location">
                <h2 id="city-name"></h2>
                <p id="date-time"></p>
            </div>

            <div class="main-info">
                <img id="weather-icon" src="" alt="Weather icon">
                <div class="temp">
                    <span id="temperature"></span>
                    <span class="unit">°C</span>
                </div>
                <p id="description"></p>
            </div>

            <div class="details">
                <div class="detail-item">
                    <span class="label">Feels like</span>
                    <span id="feels-like"></span>
                </div>
                <div class="detail-item">
                    <span class="label">Humidity</span>
                    <span id="humidity"></span>
                </div>
                <div class="detail-item">
                    <span class="label">Wind</span>
                    <span id="wind"></span>
                </div>
                <div class="detail-item">
                    <span class="label">Pressure</span>
                    <span id="pressure"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="code47.js"></script>
</body>
</html>
