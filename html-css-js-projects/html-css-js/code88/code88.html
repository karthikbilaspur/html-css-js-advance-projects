<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code88 Chess vs Random AI</title>
    <link rel="stylesheet" href="code88.css">
</head>
<body>
    <div class="container">
        <h1>Code88 Chess vs AI</h1>

        <div class="game-info">
            <div class="player-info">
                <div class="player you">
                    <span class="dot white"></span> You
                </div>
                <div class="vs">vs</div>
                <div class="player ai">
                    <span class="dot black"></span> Random AI
                </div>
            </div>
            <div class="turn-indicator">
                Turn: <span id="current-turn">White</span>
            </div>
            <div class="status" id="game-status">Your move</div>
        </div>

        <div class="board-wrapper">
            <div class="ranks">
                <div>8</div><div>7</div><div>6</div><div>5</div>
                <div>4</div><div>3</div><div>2</div><div>1</div>
            </div>
            <div id="chess-board"></div>
        </div>

        <div class="files">
            <div>a</div><div>b</div><div>c</div><div>d</div>
            <div>e</div><div>f</div><div>g</div><div>h</div>
        </div>

        <div class="controls">
            <button id="reset-btn">New Game</button>
            <button id="undo-btn">Undo Move</button>
            <button id="hint-btn">Show Legal Moves</button>
        </div>

        <div class="game-stats">
            <div>Moves: <span id="move-count">0</span></div>
            <div>Captured: <span id="captured-count">0</span></div>
        </div>
    </div>

    <script src="code88.js"></script>
</body>
</html>
