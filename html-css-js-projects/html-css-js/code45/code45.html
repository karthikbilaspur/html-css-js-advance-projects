<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker 45</title>
    <link rel="stylesheet" href="code45.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense Tracker</h1>
            <p class="subtitle">Track income and expenses with reduce()</p>
        </header>

        <div class="balance-card">
            <h3>Your Balance</h3>
            <h2 id="balance">₹0.00</h2>
            <div class="income-expense">
                <div class="money plus">
                    <h4>Income</h4>
                    <p id="money-plus">+₹0.00</p>
                </div>
                <div class="money minus">
                    <h4>Expense</h4>
                    <p id="money-minus">-₹0.00</p>
                </div>
            </div>
        </div>

        <div class="form-card">
            <h3>Add New Transaction</h3>
            <form id="form">
                <div class="form-control">
                    <label for="text">Description</label>
                    <input type="text" id="text" placeholder="Enter description..." required>
                </div>
                <div class="form-control">
                    <label for="amount">Amount<br><small>(negative = expense, positive = income)</small></label>
                    <input type="number" id="amount" placeholder="Enter amount..." step="0.01" required>
                </div>
                <div class="form-control">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="Salary">Salary</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Bills">Bills</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button class="btn">Add Transaction</button>
            </form>
        </div>

        <div class="history-card">
            <div class="history-header">
                <h3>Transaction History</h3>
                <button id="clear-all">Clear All</button>
            </div>
            <ul id="list" class="list"></ul>
            <div class="category-breakdown">
                <h4>Spending by Category</h4>
                <div id="category-stats"></div>
            </div>
        </div>
    </div>

    <script src="code45.js"></script>
</body>
</html>
