<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 39: Day of Week Finder | HTML 100 Codes</title>
  <link rel="stylesheet" href="code39.css">
  <script src="code39.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 39: Day of Week Finder</h1>
    <p class="subtitle">What day was it? What day will it be?</p>
  </header>

  <div class="finder-container">
    <div class="today-section">
      <div class="today-card">
        <div class="today-label">Today is</div>
        <div class="today-day" id="todayDay">Monday</div>
        <div class="today-date" id="todayDate">June 19, 2026</div>
      </div>
    </div>

    <div class="input-section">
      <h3>Check Any Date</h3>
      <div class="date-inputs">
        <div class="input-group">
          <label for="dateInput">Pick a Date</label>
          <input type="date" id="dateInput">
        </div>
        <div class="or-divider">OR</div>
        <div class="input-group">
          <label>Enter Manually</label>
          <div class="manual-inputs">
            <input type="number" id="yearInput" placeholder="YYYY" min="1" max="9999">
            <input type="number" id="monthInput" placeholder="MM" min="1" max="12">
            <input type="number" id="dayInput" placeholder="DD" min="1" max="31">
          </div>
        </div>
      </div>
      <button id="findBtn" class="primary-btn">Find Day</button>
    </div>

    <div class="result" id="resultBox">
      <div class="result-icon">📅</div>
      <h3 id="resultDay"></h3>
      <p id="resultFullDate"></p>
      <div class="result-details" id="resultDetails"></div>
    </div>

    <div class="calculator-section">
      <h3>Days Calculator</h3>
      <div class="calc-row">
        <input type="number" id="daysInput" placeholder="Enter days" value="100">
        <button id="calcFutureBtn" class="calc-btn">Days From Today</button>
        <button id="calcPastBtn" class="calc-btn">Days Ago</button>
      </div>
      <div id="calcResult" class="calc-result"></div>
    </div>

    <div class="info-section">
      <h3>Fun Facts</h3>
      <div class="fact-card" id="factCard">
        <span class="fact-icon">💡</span>
        <p id="factText">Click "Find Day" to see facts about that date!</p>
      </div>
    </div>
  </div>
</body>
</html>
