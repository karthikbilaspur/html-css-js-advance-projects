<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Kit 79</title>
    <link rel="stylesheet" href="code79.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🥁 Drum Kit</h1>
            <p>Press keys or click pads to play</p>
        </header>

        <div class="controls">
            <div class="volume-control">
                <label>Volume</label>
                <input type="range" id="volume" min="0" max="100" value="70">
                <span id="volume-display">70%</span>
            </div>
            <button id="record-btn" class="btn-record">
                <span class="dot"></span> Record
            </button>
            <button id="play-btn" class="btn-secondary" disabled>Play Recording</button>
            <button id="clear-btn" class="btn-secondary">Clear</button>
        </div>

        <div class="drum-kit">
            <div class="drum-pad" data-key="q" data-sound="kick">
                <div class="key">Q</div>
                <div class="sound">Kick</div>
            </div>
            <div class="drum-pad" data-key="w" data-sound="snare">
                <div class="key">W</div>
                <div class="sound">Snare</div>
            </div>
            <div class="drum-pad" data-key="e" data-sound="hihat">
                <div class="key">E</div>
                <div class="sound">Hi-Hat</div>
            </div>
            <div class="drum-pad" data-key="r" data-sound="openhat">
                <div class="key">R</div>
                <div class="sound">Open Hat</div>
            </div>
            <div class="drum-pad" data-key="a" data-sound="tom1">
                <div class="key">A</div>
                <div class="sound">Tom 1</div>
            </div>
            <div class="drum-pad" data-key="s" data-sound="tom2">
                <div class="key">S</div>
                <div class="sound">Tom 2</div>
            </div>
            <div class="drum-pad" data-key="d" data-sound="crash">
                <div class="key">D</div>
                <div class="sound">Crash</div>
            </div>
            <div class="drum-pad" data-key="f" data-sound="ride">
                <div class="key">F</div>
                <div class="sound">Ride</div>
            </div>
            <div class="drum-pad" data-key="z" data-sound="clap">
                <div class="key">Z</div>
                <div class="sound">Clap</div>
            </div>
            <div class="drum-pad" data-key="x" data-sound="cowbell">
                <div class="key">X</div>
                <div class="sound">Cowbell</div>
            </div>
            <div class="drum-pad" data-key="c" data-sound="perc">
                <div class="key">C</div>
                <div class="sound">Perc</div>
            </div>
            <div class="drum-pad" data-key="v" data-sound="bass">
                <div class="key">V</div>
                <div class="sound">808 Bass</div>
            </div>
        </div>

        <div class="visualizer">
            <canvas id="visualizer"></canvas>
        </div>

        <div class="recording-info" id="recording-info">
            <span>Recording: <strong id="rec-time">0.0s</strong></span>
        </div>
    </div>

    <script src="code79.js"></script>
</body>
</html>
