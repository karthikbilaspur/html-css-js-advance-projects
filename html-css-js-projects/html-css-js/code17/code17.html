<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 17: Traffic Light | HTML 100 Codes</title>
  <link rel="stylesheet" href="code17.css">
  <script src="code17.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 17: Traffic Light</h1>
  </header>

  <div class="traffic-container">
    <div class="traffic-light">
      <div class="light red" id="redLight"></div>
      <div class="light yellow" id="yellowLight"></div>
      <div class="light green" id="greenLight"></div>
    </div>
    <p>Current: <span id="currentState">Red</span></p>
    <button id="startBtn">Start Cycle</button>
    <button id="stopBtn">Stop</button>
  </div>
</body>
</html>
