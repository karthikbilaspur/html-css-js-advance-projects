<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 11: Title: Tabs Component | HTML 100 Codes</title>
  <link rel="stylesheet" href="code11.css">
  <script src="code11.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 11: Title</h1>
  </header>
<div class="tabs-container">
        <div class="tab-header">
            <button class="tab-btn active" data-target="tab1">Home</button>
            <button class="tab-btn" data-target="tab2">Profile</button>
            <button class="tab-btn" data-target="tab3">Settings</button>
        </div>

        <div class="tab-content" id="tab1">
            <h3>Home Content</h3>
            <p>Welcome to the dashboard. This is the home view.</p>
        </div>
        <div class="tab-content" id="tab2" style="display: none;">
            <h3>Profile Content</h3>
            <p>Here you can manage your personal information.</p>
        </div>
        <div class="tab-content" id="tab3" style="display: none;">
            <h3>Settings Content</h3>
            <p>Adjust your preferences and security settings here.</p>
        </div>
    </div>
</body>
</html>
