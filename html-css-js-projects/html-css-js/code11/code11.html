    </div>
    <div class="tab-content" id="tab2" role="tabpanel" aria-labelledby="tab-btn-2" hidden>

    </div>
    <div class="tab-content" id="tab3" role="tabpanel" aria-labelledby="tab-btn-3" hidden>
      <h3>Settings Content</h3>
      <p>Adjust your preferences and security settings here.</p>
