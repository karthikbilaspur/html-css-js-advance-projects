<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code94 Image Crop Tool</title>
    <link rel="stylesheet" href="code94.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Code94 Image Cropper</h1>
            <div class="controls">
                <input type="file" id="file-input" accept="image/*" hidden>
                <button id="upload-btn" class="btn-primary">Upload Image</button>
                <button id="reset-btn">Reset Crop</button>
                <button id="rotate-btn">Rotate 90°</button>
                <button id="export-btn" disabled>Export PNG</button>
            </div>
        </header>

        <div class="main">
            <div class="canvas-wrapper">
                <canvas id="canvas"></canvas>
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-icon">📸</div>
                    <p>Drag & drop an image here or click Upload</p>
                    <span>JPG, PNG, WebP supported</span>
                </div>
            </div>

            <aside class="sidebar">
                <h3>Crop Settings</h3>
                
                <div class="setting-group">
                    <label>Aspect Ratio</label>
                    <select id="aspect-ratio">
                        <option value="free">Free</option>
                        <option value="1:1">1:1 Square</option>
                        <option value="4:3">4:3</option>
                        <option value="16:9">16:9</option>
                        <option value="3:2">3:2</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Crop Dimensions</label>
                    <div class="dimension-row">
                        <input type="number" id="crop-w" placeholder="Width" readonly>
                        <span>×</span>
                        <input type="number" id="crop-h" placeholder="Height" readonly>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Position</label>
                    <div class="dimension-row">
                        <input type="number" id="crop-x" placeholder="X" readonly>
                        <span>,</span>
                        <input type="number" id="crop-y" placeholder="Y" readonly>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Export Quality</label>
                    <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.92">
                    <div class="range-value"><span id="quality-val">92%</span></div>
                </div>

                <div class="info-box">
                    <p><strong>Tips:</strong></p>
                    <p>• Drag corners to resize</p>
                    <p>• Drag center to move</p>
                    <p>• Hold Shift for square</p>
                </div>
            </aside>
        </div>
    </div>

    <script src="code94.js"></script>
</body>
</html>
