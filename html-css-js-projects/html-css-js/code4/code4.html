<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Character Counter</title>
    <link rel ="stylesheet" href ="code4.css"> 
</head>
<body>
    <!-- code4.html content -->
    <div class="container">
        <h1>Live Character Counter</h1>
        
        <div class="input-group">
            <textarea 
                id="textInput" 
                placeholder="Start typing here and watch the counter update in real time..."
                maxlength="200"
            ></textarea>
        </div>

        <div class="counter-wrapper">
            <p id="charCount" class="safe">Characters: 0</p>
            <span class="limit-text">Max: 200 characters</span>
        </div>

        <div class="tip">
            💡 Try typing to see the counter change colors as you approach the limit!
        </div>
    </div>

    <script src="code4.js"></script>
</body>
</html>
