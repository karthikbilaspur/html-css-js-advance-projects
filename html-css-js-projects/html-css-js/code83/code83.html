<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Maker 83</title>
    <link rel="stylesheet" href="code83.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Pixel Art Maker</h1>
        </header>

        <div class="toolbar">
            <div class="tool-section">
                <label>Color</label>
                <input type="color" id="color-picker" value="#e94560">
                <div class="palette" id="palette">
                    <div class="color-swatch" data-color="#000000" style="background: #000000"></div>
                    <div class="color-swatch" data-color="#ffffff" style="background: #ffffff; border: 1px solid #ddd"></div>
                    <div class="color-swatch" data-color="#e94560" style="background: #e94560"></div>
                    <div class="color-swatch" data-color="#667eea" style="background: #667eea"></div>
                    <div class="color-swatch" data-color="#43e97b" style="background: #43e97b"></div>
                    <div class="color-swatch" data-color="#f9ca24" style="background: #f9ca24"></div>
                    <div class="color-swatch" data-color="#f093fb" style="background: #f093fb"></div>
                    <div class="color-swatch" data-color="#4facfe" style="background: #4facfe"></div>
                </div>
            </div>

            <div class="tool-section">
                <label>Grid Size</label>
                <select id="grid-size">
                    <option value="8">8 × 8</option>
                    <option value="16" selected>16 × 16</option>
                    <option value="32">32 × 32</option>
                    <option value="64">64 × 64</option>
                </select>
            </div>

            <div class="tool-section">
                <button id="draw-btn" class="tool-btn active" title="Draw">
                    <i class="fas fa-pencil"></i>
                </button>
                <button id="erase-btn" class="tool-btn" title="Eraser">
                    <i class="fas fa-eraser"></i>
                </button>
                <button id="fill-btn" class="tool-btn" title="Fill">
                    <i class="fas fa-fill-drip"></i>
                </button>
                <button id="eyedropper-btn" class="tool-btn" title="Eyedropper">
                    <i class="fas fa-eye-dropper"></i>
                </button>
            </div>

            <div class="tool-section">
                <button id="grid-toggle" class="btn-secondary">
                    <i class="fas fa-border-all"></i> Grid
                </button>
                <button id="clear-btn" class="btn-secondary">
                    <i class="fas fa-trash"></i> Clear
                </button>
                <button id="export-btn" class="btn-primary">
                    <i class="fas fa-download"></i> Export PNG
                </button>
            </div>
        </div>

        <div class="canvas-wrapper">
            <div id="pixel-grid" class="pixel-grid"></div>
        </div>

        <div class="info">
            <span id="canvas-info">16 × 16 pixels</span>
            <span id="hover-coords">—</span>
        </div>
    </div>

    <script src="code83.js"></script>
</body>
</html>
