<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>050-stinky-todo-list-notes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🗑️ Stinky To-Do</h1>
            <p class="tagline">Tasks rot if you ignore them</p>
            <div class="stats">
                <div class="stat">
                    <span class="stat-number" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="stinkyCount">0</span>
                    <span class="stat-label">Stinky 💀</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="doneCount">0</span>
                    <span class="stat-label">Done ✓</span>
                </div>
            </div>
        </header>

        <div class="add-section">
            <input type="text" id="todoInput" placeholder="Add a task before it starts stinking..." maxlength="100">
            <input type="text" id="noteInput" placeholder="Add a note (optional)" maxlength="200">
            <div class="add-controls">
                <select id="prioritySelect">
                    <option value="low">Low 🟢</option>
                    <option value="medium" selected>Medium 🟡</option>
                    <option value="high">High 🔴</option>
                </select>
                <select id="categorySelect">
                    <option value="general">General</option>
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                    <option value="urgent">Urgent</option>
                </select>
                <button id="addBtn">Add Task</button>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="stinky">Stinky</button>
            <button class="filter-btn" data-filter="done">Done</button>
        </div>

        <div class="todo-list" id="todoList"></div>

        <div class="empty-state" id="emptyState">
            <div class="empty-icon">🧹</div>
            <h3>All clean!</h3>
            <p>No stinky tasks here. Add one before things get messy.</p>
        </div>

        <button class="clear-btn" id="clearDoneBtn">Clear Completed</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
