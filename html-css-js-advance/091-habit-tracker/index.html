<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Timetable Generator - 091</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>SMART TIMETABLE <span class="project-num">091</span></h1>
      <div class="stats">
        <div class="stat">Classes: <span id="classCount">0</span></div>
        <div class="stat">Conflicts: <span id="conflictCount">0</span></div>
        <div class="stat">Status: <span id="status">Ready</span></div>
      </div>
    </header>

    <div class="controls">
      <button id="autoBtn">🤖 Auto-Generate</button>
      <button id="clearBtn">Clear All</button>
      <button id="exportBtn">Export PNG</button>
      <button id="saveBtn">Save</button>
    </div>

    <div class="main-layout">
      <div class="sidebar">
        <h3>Add Class</h3>
        <div class="input-group">
          <input type="text" id="subjectInput" placeholder="Subject" />
          <input type="text" id="teacherInput" placeholder="Teacher" />
          <input type="text" id="roomInput" placeholder="Room" />
          <select id="durationInput">
            <option value="1">1 Hour</option>
            <option value="2">2 Hours</option>
          </select>
          <button id="addClassBtn">+ Add to Pool</button>
        </div>

        <h3>Class Pool</h3>
        <div id="classPool" class="class-pool"></div>
      </div>

      <div class="timetable-wrapper">
        <canvas id="timetableCanvas"></canvas>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="color-box conflict"></span> Conflict</div>
      <div class="legend-item"><span class="color-box valid"></span> Valid</div>
      <div class="legend-item"><span class="color-box empty"></span> Empty</div>
      <p>Drag classes from pool to timetable. Auto-Generate solves clashes.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
