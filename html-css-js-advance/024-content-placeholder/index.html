<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>024-content-placeholder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Feed</h1>
        
        <!-- Button to simulate loading -->
        <button id="loadBtn">Load Content</button>

        <!-- Skeleton placeholder -->
        <div class="card" id="skeleton">
            <div class="card-header">
                <div class="img placeholder animated"></div>
                <div class="header-text">
                    <div class="line placeholder animated"></div>
                    <div class="line placeholder animated short"></div>
                </div>
            </div>
            <div class="card-content">
                <div class="line placeholder animated"></div>
                <div class="line placeholder animated"></div>
                <div class="line placeholder animated"></div>
                <div class="line placeholder animated short"></div>
            </div>
        </div>

        <!-- Actual content - hidden initially -->
        <div class="card" id="realContent" style="display: none;">
            <div class="card-header">
                <img src="https://i.pravatar.cc/60" alt="Avatar" class="img">
                <div class="header-text">
                    <h3>Karthik Cwrp</h3>
                    <p>Posted 2 hours ago</p>
                </div>
            </div>
            <div class="card-content">
                <p>Just finished building a content placeholder with HTML, CSS and JS. Skeleton screens make loading feel faster than spinners.</p>
                <p>Pretty happy with how clean it looks. Next up: hooking this to a real API.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
