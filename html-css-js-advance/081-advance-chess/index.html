<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chess 081</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <h1>Chess</h1>
    <div class="stats">
      <div class="stat">Turn: <span id="turn">White</span></div>
      <div class="stat" id="status">Your move</div>
    </div>

    <div class="board-wrapper">
      <div class="board" id="board"></div>

      <div class="overlay" id="menuScreen">
        <h2>Chess</h2>
        <p>Play vs Medium AI</p>
        <button id="startBtn">Play as White</button>
        <button id="startBlackBtn">Play as Black</button>
        <div class="difficulty">
          <label>AI Depth: <span id="depthLabel">2</span></label>
          <input type="range" id="depthSlider" min="1" max="3" value="2">
        </div>
      </div>

      <div class="overlay" id="gameOverScreen">
        <h2 id="gameOverText">Checkmate!</h2>
        <p id="gameOverSubtext">White wins</p>
        <button id="restartBtn">Play Again</button>
        <button id="menuBtn">Main Menu</button>
      </div>
    </div>

    <div class="controls">
      <button id="undoBtn">Undo</button>
      <button id="newGameBtn">New Game</button>
    </div>

    <div class="captured">
      <div class="captured-side" id="capturedBlack"></div>
      <div class="captured-side" id="capturedWhite"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
