<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>055-expense-tracker-charts</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Expense Tracker</h1>
            <p class="subtitle">Track your money, master your budget</p>
        </header>

        <div class="summary-cards">
            <div class="card balance-card">
                <div class="card-label">Total Balance</div>
                <div class="card-value" id="totalBalance">$0.00</div>
            </div>
            <div class="card income-card">
                <div class="card-label">Total Income</div>
                <div class="card-value" id="totalIncome">$0.00</div>
            </div>
            <div class="card expense-card">
                <div class="card-label">Total Expenses</div>
                <div class="card-value" id="totalExpense">$0.00</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="form-section">
                <h2>Add Transaction</h2>
                <form id="transactionForm">
                    <div class="form-group">
                        <label>Type</label>
                        <div class="type-toggle">
                            <button type="button" class="type-btn active" data-type="expense">Expense</button>
                            <button type="button" class="type-btn" data-type="income">Income</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="food">🍔 Food</option>
                            <option value="transport">🚗 Transport</option>
                            <option value="shopping">🛍️ Shopping</option>
                            <option value="bills">📄 Bills</option>
                            <option value="entertainment">🎬 Entertainment</option>
                            <option value="health">🏥 Health</option>
                            <option value="salary">💼 Salary</option>
                            <option value="freelance">💻 Freelance</option>
                            <option value="other">📦 Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="What was this for?" maxlength="100">
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>

                    <button type="submit" class="btn-submit">Add Transaction</button>
                </form>

                <div class="actions">
                    <button class="btn-action" id="exportBtn">📥 Export CSV</button>
                    <button class="btn-action danger" id="clearBtn">🗑️ Clear All</button>
                </div>
            </div>

            <div class="charts-section">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>Expenses by Category</h3>
                        <select id="monthFilter" class="filter-select"></select>
                    </div>
                    <canvas id="pieChart"></canvas>
                </div>

                <div class="chart-card">
                    <h3>Income vs Expenses</h3>
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

        <div class="transactions-section">
            <div class="transactions-header">
                <h2>Recent Transactions</h2>
                <div class="transaction-filters">
                    <button class="filter-chip active" data-filter="all">All</button>
                    <button class="filter-chip" data-filter="income">Income</button>
                    <button class="filter-chip" data-filter="expense">Expense</button>
                </div>
            </div>
            <div class="transactions-list" id="transactionsList"></div>
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📊</div>
                <h3>No transactions yet</h3>
                <p>Add your first income or expense to get started</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
