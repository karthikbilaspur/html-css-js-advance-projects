<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>054-visualizer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="player-container">
        <div class="player-card">
            <div class="album-section">
                <div class="album-art" id="albumArt">
                    <div class="default-art">🎵</div>
                </div>
                <canvas id="visualizer"></canvas>
            </div>

            <div class="info-section">
                <div class="song-info">
                    <h2 id="songTitle">Select a Song</h2>
                    <p id="songArtist">Unknown Artist</p>
                    <p id="songAlbum">No Album</p>
                </div>

                <div class="progress-section">
                    <div class="time-info">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>

                <div class="controls">
                    <button class="control-btn" id="shuffleBtn" title="Shuffle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="16 3 21 3 21 8"></polyline>
                            <line x1="4" y1="20" x2="21" y2="3"></line>
                            <polyline points="21 16 21 16 21"></polyline>
                            <line x1="15" y1="15" x2="21" y2="21"></line>
                            <line x1="4" y1="4" x2="9" y2="9"></line>
                        </svg>
                    </button>

                    <button class="control-btn" id="prevBtn" title="Previous">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="19 20 9 12 19 4 19 20"></polygon>
                            <line x1="5" y1="19" x2="5" y2="5"></line>
                        </svg>
                    </button>

                    <button class="control-btn play-btn" id="playPauseBtn" title="Play/Pause">
                        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="4" width="4" height="16"></rect>
                            <rect x="14" y="4" width="4" height="16"></rect>
                        </svg>
                    </button>

                    <button class="control-btn" id="nextBtn" title="Next">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 4 15 12 5 20 5 4"></polygon>
                            <line x1="19" y1="5" x2="19" y2="19"></line>
                        </svg>
                    </button>

                    <button class="control-btn" id="repeatBtn" title="Repeat">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="17 1 21 5 17 9"></polyline>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                            <polyline points="7 23 3 19 7 15"></polyline>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                        </svg>
                    </button>
                </div>

                <div class="volume-section">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70" title="Volume">Volume Slider
                    <span id="volumeValue">70%</span>
                </div>
            </div>
        </div>

        <div class="playlist-card">
            <div class="playlist-header">
                <h3>Playlist</h3>
                <span id="playlistCount">0 songs</span>
            </div>
            <div class="playlist" id="playlist"></div>
        </div>
    </div>

    <audio id="audioPlayer" crossorigin="anonymous"></audio>

        <nav class="page-footer-nav" aria-label="Project navigation">

    <script src="script.js"></script>
    
</body>
</html>
