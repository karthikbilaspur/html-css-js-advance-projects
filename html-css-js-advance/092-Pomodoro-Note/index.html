<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timetable - 092</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>POMODORO TIMETABLE <span class="project-num">092</span></h1>
      <div class="stats">
        <div class="stat">Today: <span id="todaySessions">0</span> sessions</div>
        <div class="stat">Total: <span id="totalTime">0</span> min</div>
        <div class="stat">Streak: <span id="streak">0</span> days</div>
      </div>
    </header>

    <div class="main-layout">
      <div class="sidebar">
        <h3>Quick Add Class</h3>
        <div class="input-group">
          <input type="text" id="subjectInput" placeholder="Subject" />
          <select id="durationInput">
            <option value="1">1 Period</option>
            <option value="2">2 Periods</option>
          </select>
          <button id="addClassBtn">+ Add</button>
        </div>

        <div class="pomodoro-panel">
          <h3 id="currentSubject">No Class Selected</h3>
          <div class="timer-display" id="timerDisplay">25:00</div>
          <div class="timer-phase" id="timerPhase">Ready to Focus</div>
          <div class="timer-controls">
            <button id="startBtn">Start</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
          </div>
          <div class="session-stats">
            <div>Sessions: <span id="sessionCount">0</span></div>
            <div>Today: <span id="todayMinutes">0</span> min</div>
          </div>
        </div>

        <h3>Class Pool</h3>
        <div id="classPool" class="class-pool"></div>
      </div>

      <div class="timetable-wrapper">
        <div class="controls">
          <button id="autoBtn">🤖 Auto-Fill Week</button>
          <button id="clearBtn">Clear All</button>
          <select id="pomodoroLength">
            <option value="25">25/5 Pomodoro</option>
            <option value="50">50/10 Deep Work</option>
            <option value="15">15/3 Sprint</option>
          </select>
        </div>
        <canvas id="timetableCanvas"></canvas>
      </div>
    </div>

    <div class="legend">
      <p>Click a class to start Pomodoro. Drag from pool to schedule. Auto-Fill distributes classes evenly.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
