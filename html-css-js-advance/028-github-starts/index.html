<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>028 - GitHub Stories</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stories-container">
        <h1>GitHub Stories</h1>
        
        <!-- Story circles -->
        <div class="stories-list" id="storiesList">
            <!-- Generated by JS -->
        </div>

        <!-- Story viewer modal -->
        <div class="story-modal" id="storyModal" role="dialog" aria-modal="true" aria-label="Story viewer">
            <div class="story-content">
                <div class="story-header">
                    <div class="progress-bar" id="progressBar">
                        <!-- Progress segments generated by JS -->
                    </div>
                    <div class="user-info">
                        <img src="" alt="Avatar" class="story-avatar" id="storyAvatar">
                        <span class="story-username" id="storyUsername"></span>
                        <span class="story-time" id="storyTime"></span>
                    </div>
                    <button class="close-btn" id="closeBtn" aria-label="Close story">&times;</button>
                </div>

                <div class="story-body" id="storyBody">
                    <div class="story-image" id="storyImage"></div>
                    <div class="story-text" id="storyText"></div>
                </div>

                <!-- Tap areas for navigation -->
                <div class="tap-area left" id="tapLeft" aria-label="Previous story"></div>
                <div class="tap-area right" id="tapRight" aria-label="Next story"></div>
            </div>
        </div>
    </div>

</body>
</html>
