<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>036-hoverboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Hoverboard</h1>
        <p class="subtitle">Move your mouse over the squares</p>

        <div class="controls">
            <label for="colorPicker">Color:</label>
            <input type="color" id="colorPicker" value="#5cdb95">

            <label for="sizeSlider">Grid Size:</label>
            <input type="range" id="sizeSlider" min="10" max="40" value="20">
            <span id="sizeValue">20</span>

            <button class="btn" id="clearBtn">Clear</button>
        </div>

        <div class="board" id="board"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
