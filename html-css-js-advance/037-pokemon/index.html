<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>037-pokedex</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pokédex</h1>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Pokémon by name or ID...">
            <button class="btn" id="searchBtn">Search</button>
            <button class="btn btn-secondary" id="randomBtn">Random</button>
        </div>

        <div class="filters">
            <select id="typeFilter">
                <option value="">All Types</option>
                <option value="fire">Fire</option>
                <option value="water">Water</option>
                <option value="grass">Grass</option>
                <option value="electric">Electric</option>
                <option value="psychic">Psychic</option>
                <option value="ice">Ice</option>
                <option value="dragon">Dragon</option>
                <option value="dark">Dark</option>
                <option value="fairy">Fairy</option>
            </select>
        </div>

        <div class="loader" id="loader">
            <div class="pokeball"></div>
        </div>

        <div class="pokemon-grid" id="pokemonGrid"></div>

        <div class="pagination">
            <button class="btn" id="prevBtn" disabled>Previous</button>
            <span id="pageInfo">Page 1</span>
            <button class="btn" id="nextBtn">Next</button>
        </div>
    </div>

    <!-- Modal for detailed view -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
