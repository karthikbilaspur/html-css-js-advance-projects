<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algo Visualizer - 096</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>ALGO VISUALIZER <span class="project-num">096</span></h1>
      <div class="mode-switch">
        <button class="mode-btn active" data-mode="sort">📊 Sorting</button>
        <button class="mode-btn" data-mode="path">🗺️ Pathfinding</button>
      </div>
    </header>

    <!-- SORTING MODE -->
    <div class="mode-panel" id="sortMode">
      <div class="controls">
        <select id="sortAlgo">
          <option value="bubble">Bubble Sort O(n²)</option>
          <option value="selection">Selection Sort O(n²)</option>
          <option value="insertion">Insertion Sort O(n²)</option>
          <option value="quick">Quick Sort O(n log n)</option>
          <option value="merge">Merge Sort O(n log n)</option>
        </select>
        <label>Size: <input type="range" id="arraySize" min="10" max="100" value="50"></label>
        <label>Speed: <input type="range" id="sortSpeed" min="1" max="100" value="50"></label>
        <button id="newArrayBtn">New Array</button>
        <button id="sortBtn">Sort!</button>
        <button id="stopSortBtn">Stop</button>
      </div>

      <div class="stats">
        <div class="stat">Comparisons: <span id="comparisons">0</span></div>
        <div class="stat">Swaps: <span id="swaps">0</span></div>
        <div class="stat">Time: <span id="sortTime">0</span>ms</div>
      </div>

      <canvas id="sortCanvas"></canvas>
    </div>

    <!-- PATHFINDING MODE -->
    <div class="mode-panel" id="pathMode" style="display:none;">
      <div class="controls">
        <select id="pathAlgo">
          <option value="astar">A* Search</option>
          <option value="dijkstra">Dijkstra</option>
          <option value="bfs">Breadth-First Search</option>
          <option value="dfs">Depth-First Search</option>
        </select>
        <button id="startNodeBtn" class="tool-btn">🎯 Start</button>
        <button id="endNodeBtn" class="tool-btn">🏁 End</button>
        <button id="wallBtn" class="tool-btn active">🧱 Wall</button>
        <button id="clearPathBtn">Clear</button>
        <button id="mazeBtn">Generate Maze</button>
        <button id="findPathBtn">Find Path!</button>
      </div>

      <div class="stats">
        <div class="stat">Visited: <span id="visited">0</span></div>
        <div class="stat">Path Length: <span id="pathLength">0</span></div>
        <div class="stat">Time: <span id="pathTime">0</span>ms</div>
      </div>

      <canvas id="pathCanvas"></canvas>
      <div class="legend">
        <span class="legend-item"><div class="box start"></div>Start</span>
        <span class="legend-item"><div class="box end"></div>End</span>
        <span class="legend-item"><div class="box wall"></div>Wall</span>
        <span class="legend-item"><div class="box visited"></div>Visited</span>
        <span class="legend-item"><div class="box path"></div>Path</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
