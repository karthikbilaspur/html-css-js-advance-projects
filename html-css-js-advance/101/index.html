<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex - LifeOS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="logo">Apex</div>
      <nav>
        <button data-view="dash" class="nav-item active">
          <span>◆</span> Dashboard
        </button>
        <button data-view="habits" class="nav-item">
          <span>✓</span> Habits
        </button>
        <button data-view="focus" class="nav-item">
          <span>◉</span> Focus
        </button>
        <button data-view="money" class="nav-item">
          <span>₹</span> Money
        </button>
        <button data-view="notes" class="nav-item">
          <span>✎</span> Notes
        </button>
      </nav>
      <div class="sidebar-footer">
        <button id="theme-toggle">☀</button>
        <button id="export-data">↓</button>
      </div>
    </aside>

    <main id="main">
      <header>
        <div id="greeting"></div>
        <div class="header-stats">
          <div class="h-stat"><span id="h-streak">0</span><label>Day Streak</label></div>
          <div class="h-stat"><span id="h-score">0</span><label>Focus Score</label></div>
          <div class="h-stat"><span id="h-balance">₹0</span><label>Month Left</label></div>
        </div>
      </header>

      <!-- DASHBOARD -->
      <section id="dash" class="view active">
        <div class="grid">
          <div class="card span-2">
            <h3>Today's Plan</h3>
            <div id="today-agenda"></div>
          </div>
          <div class="card">
            <h3>Deep Work</h3>
            <div class="progress-ring" id="deep-ring"><span>0h</span></div>
          </div>
          <div class="card">
            <h3>Habits</h3>
            <div id="dash-habits"></div>
          </div>
          <div class="card span-2">
            <h3>Week Overview</h3>
            <canvas id="week-chart" height="80"></canvas>
          </div>
        </div>
      </section>

      <!-- HABITS -->
      <section id="habits" class="view">
        <div class="card">
          <div class="card-head">
            <h2>Habits</h2>
            <button onclick="Apex.modal('habit')">+ New Habit</button>
          </div>
          <div id="habit-list"></div>
        </div>
      </section>

      <!-- FOCUS -->
      <section id="focus" class="view">
        <div class="grid">
          <div class="card span-2 focus-timer">
            <div id="focus-current">No active session</div>
            <div class="timer-display" id="timer">00:00</div>
            <div class="timer-ctrls">
              <button id="t-start">Start</button>
              <button id="t-pause" disabled>Pause</button>
              <button id="t-stop" disabled class="danger">End</button>
            </div>
          <div class="card">
            <h3>Timeblocks</h3>
            <div id="blocks"></div>
            <button onclick="Apex.modal('block')" class="btn-full">+ Add Block</button>
          </div>
          <div class="card span-3">
            <h3>Focus History</h3>
            <div id="focus-log"></div>
          </div>
        </div>
      </section>

      <!-- MONEY -->
      <section id="money" class="view">
        <div class="grid">
          <div class="card">
            <h3>Quick Add</h3>
            <div class="quick-grid" id="expense-quick"></div>
            <form id="expense-form">
              <input type="number" id="ex-amt" placeholder="Amount" step="0.01" required>
              <select id="ex-cat" required></select>
              <input type="text" id="ex-note" placeholder="Note">
              <button>Add Expense</button>
            </form>
          </div>
          <div class="card">
            <h3>Budgets</h3>
            <div id="budget-list"></div>
            <button onclick="Apex.modal('budget')" class="btn-full">+ Set Budget</button>
          </div>
          <div class="card span-2">
            <h3>Spending Trend</h3>
            <canvas id="money-chart" height="100"></canvas>
          </div>
        </div>
      </section>

      <!-- NOTES -->
      <section id="notes" class="view">
        <div class="card">
          <div class="card-head">
            <h2>Notes</h2>
            <input type="search" id="note-search" placeholder="Search...">
            <button onclick="Apex.addNote()">+ New</button>
          </div>
          <div id="note-list"></div>
        </div>
      </section>
    </main>
  </div>

  <dialog id="modal"></dialog>
  <script src="script.js"></script>
</body>
</html>
