<body>
    <div class="container">
        <h1>Toast Notifications</h1>
        <p>Click a button to show a toast</p>

        <div class="buttons">
            <button id="successBtn" class="btn success">Success</button>
            <button id="errorBtn" class="btn error">Error</button>
            <button id="infoBtn" class="btn info">Info</button>
            <button id="warningBtn" class="btn warning">Warning</button>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toasts" aria-live="polite" aria-atomic="true"></div>
