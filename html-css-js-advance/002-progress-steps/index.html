<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Steps | KarthikCodingSolutions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>KarthikCodingSolutions</h1>
      <p>Project 002: Progress Steps</p>
    </header>

    <div class="progress-container">
      <div class="progress" id="progress"></div>
      <div class="circle active">1</div>
      <div class="circle">2</div>
      <div class="circle">3</div>
      <div class="circle">4</div>
    </div>

    <div class="content">
      <h2 id="step-title">Plan Project</h2>
      <p id="step-desc">Define requirements, scope, and tech stack for your build.</p>
    </div>

    <div class="btn-container">
      <button class="btn" id="prev" disabled>Prev</button>
      <button class="btn" id="next">Next</button>
    </div>

    <footer>
      <p>&copy; 2026 KarthikCodingSolutions</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
