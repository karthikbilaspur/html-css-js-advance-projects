<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>048 - Random Image Generator Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header class="hero">
            <h1>Random Image Generator</h1>
            <p class="subtitle">Powered by Picsum Photos • Press <kbd>Space</kbd> to generate</p>
        </header>

        <div class="app-layout">
            <aside class="controls-panel" aria-label="Image controls">
                <div class="control-group">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="">All</option>
                        <option value="nature">Nature</option>
                        <option value="city">City</option>
                        <option value="technology">Technology</option>
                        <option value="food">Food</option>
                        <option value="animals">Animals</option>
                        <option value="space">Space</option>
                        <option value="abstract">Abstract</option>
                    </select>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label for="width">Width</label>
                        <input type="number" id="width" value="800" min="200" max="1920" step="100">
                    </div>
                    <div class="control-group">
                        <label for="height">Height</label>
                        <input type="number" id="height" value="600" min="200" max="1080" step="100">
                    </div>
                </div>

                <div class="control-group">
                    <label for="preset">Presets</label>
                    <div class="preset-grid">
                        <button class="preset-btn" data-w="1920" data-h="1080">16:9 HD</button>
                        <button class="preset-btn" data-w="1080" data-h="1080">1:1 Square</button>
                        <button class="preset-btn" data-w="1080" data-h="1350">4:5 IG</button>
                        <button class="preset-btn" data-w="800" data-h="600">4:3</button>
                    </div>
                </div>

                <div class="control-group">
                    <label for="blur">Blur: <span id="blurValue">0</span></label>
                    <input type="range" id="blur" min="0" max="10" value="0">
                </div>

                <div class="control-group checkbox-group">
                    <label>
                        <input type="checkbox" id="grayscale">
                        <span>Grayscale</span>
                    </label>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" id="generateBtn" aria-label="Generate new image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                        Generate
                    </button>
                    <button class="btn" id="downloadBtn" aria-label="Download image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </button>
                    <button class="btn" id="favoriteBtn" aria-label="Add to favorites" aria-pressed="false">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                </div>
            </aside>

            <section class="viewer" aria-live="polite">
                <div class="image-container">
                    <div class="loader" id="loader" aria-hidden="true">
                        <div class="spinner"></div>
                        <p>Loading...</p>
                    </div>
                    <div class="error-state" id="errorState" hidden>
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <p>Failed to load image</p>
                        <button class="btn btn-sm" id="retryBtn">Retry</button>
                    </div>
                    <img id="randomImage" src="https://picsum.photos/800/600" alt="Random generated image" loading="eager">
                </div>

                <div class="image-info">
                    <div class="info-row">
                        <div class="info-item">
                            <strong>Size:</strong>
                            <span id="imageSize">800 x 600</span>
                        </div>
                        <div class="info-item">
                            <strong>ID:</strong>
                            <span id="imageId">—</span>
                        </div>
                    <div class="info-item url-row">
                        <strong>URL:</strong>
                        <input type="text" id="imageUrl" readonly aria-label="Image URL">
                        <button class="copy-btn" id="copyBtn" aria-label="Copy URL">Copy</button>
                    </div>
                </div>
            </section>
        </div>

        <section class="history-section">
            <div class="tabs" role="tablist">
                <button class="tab active" role="tab" aria-selected="true" data-tab="recent">Recent</button>
                <button class="tab" role="tab" aria-selected="false" data-tab="favorites">Favorites</button>
            </div>
            <div class="history-grid" id="historyGrid" role="tabpanel"></div>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <footer class="footer-wrap">
        <nav class="page-footer-nav" aria-label="Project navigation">
            <a href="../047-html-quiz/index.html">&larr; Previous: Code 047</a>
            <a href="../../index.html">Home</a>
            <a href="../049-brand-mood-brands/index.html">Next: Code 049
                 &rarr;</a>
        </nav>
        <p class="credit">Built as part of HTML 100 Codes • Bangalore, India</p>
        <p class="copyright">&copy; 2026 KarthikCodingSolutions. Built with vanilla JS.</p>
    </footer>


    <script src="script.js"></script>
</body>
</html>
