<!DOCTYPE html>
<html lang="en">
<head>

  <title>Expanding Cards | KarthikCodingSolutions</title>

      </div>

        <h3>Deploy</h3>
      </div>
      <div class="card" style="background-image: url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=800')">

      </div>
    </div>

    <footer>
