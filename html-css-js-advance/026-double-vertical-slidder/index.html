<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>026 - Double Vertical Slider</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="slider-container">
        <div class="left-slide">
            <div>
                <h1>Flying Eagle</h1>
                <p>in the sunset</p>
            </div>
            <div>
                <h1>Lonely Castle</h1>
                <p>in the wilderness</p>
            </div>
            <div>
                <h1>Blue Sky</h1>
                <p>with mountains</p>
            </div>
            <div>
                <h1>Nature Flower</h1>
                <p>all in pink</p>
            </div>
        </div>

        <div class="right-slide">
            <div class="slide-img slide-1"></div>
            <div class="slide-img slide-2"></div>
            <div class="slide-img slide-3"></div>
            <div class="slide-img slide-4"></div>
        </div>

        <div class="action-buttons">
            <button class="up-button" aria-label="Previous slide">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
            </button>
            <button class="down-button" aria-label="Next slide">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
        </div>
    </div>

        </nav>

    <script src="script.js"></script>
</body>
</html>
