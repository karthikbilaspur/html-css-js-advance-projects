<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tetris 077</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <h1>Tetris</h1>
    <div class="game-layout">
      <div class="side-panel left">
        <div class="stat-box">
          <div class="label">HOLD</div>
          <canvas id="holdCanvas" width="100" height="100"></canvas>
        </div>
        <div class="stat-box">
          <div class="label">SCORE</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="stat-box">
          <div class="label">LEVEL</div>
          <div class="value" id="level">1</div>
        </div>
        <div class="stat-box">
          <div class="label">LINES</div>
          <div class="value" id="lines">0</div>
        </div>
      </div>

      <div class="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>

        <div class="overlay" id="menuScreen">
          <h2>Tetris</h2>
          <p>High Score: <span id="highScoreMenu">0</span></p>
          <button id="startBtn">Start Game</button>
          <div class="controls-info">
            <p>← → Move | ↓ Soft Drop</p>
            <p>Z X Rotate | Space Hard Drop</p>
            <p>C Hold | P Pause</p>
          </div>
        </div>

        <div class="overlay" id="pauseScreen">
          <h2>Paused</h2>
          <button id="resumeBtn">Resume</button>
          <button id="menuBtn">Main Menu</button>
        </div>

        <div class="overlay" id="gameOverScreen">
          <h2>Game Over</h2>
          <p>Score: <span id="finalScore">0</span></p>
          <p>Level: <span id="finalLevel">1</span></p>
          <p>Best: <span id="bestScore">0</span></p>
          <button id="restartBtn">Play Again</button>
          <button id="menuBtn2">Main Menu</button>
        </div>
      </div>

      <div class="side-panel right">
        <div class="stat-box">
          <div class="label">NEXT</div>
          <canvas id="nextCanvas" width="100" height="300"></canvas>
        </div>
      </div>
    </div>

    <div class="mobile-controls" id="mobileControls">
      <div class="dpad">
        <button class="control-btn" id="leftBtn">◀</button>
        <button class="control-btn" id="downBtn">▼</button>
        <button class="control-btn" id="rightBtn">▶</button>
      </div>
      <div class="actions">
        <button class="control-btn" id="rotateLeftBtn">⟲</button>
        <button class="control-btn drop-btn" id="dropBtn">⬇</button>
        <button class="control-btn" id="rotateRightBtn">⟳</button>
      </div>
      <div class="extra">
        <button class="control-btn small" id="holdBtn">H</button>
        <button class="control-btn small" id="pauseBtn">⏸</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
