<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Simon Says 078</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <h1>Simon Says</h1>
    <div class="stats">
      <div class="stat">Level: <span id="level">0</span></div>
      <div class="stat">Best: <span id="highScore">0</span></div>
    </div>

    <div class="game-board" id="gameBoard">
      <div class="simon-btn" data-color="green" id="green"></div>
      <div class="simon-btn" data-color="red" id="red"></div>
      <div class="simon-btn" data-color="yellow" id="yellow"></div>
      <div class="simon-btn" data-color="blue" id="blue"></div>

      <div class="center-circle">
        <div class="status" id="status">SIMON</div>
        <button class="start-btn" id="startBtn">Start</button>
      </div>
    </div>

    <div class="overlay" id="gameOverScreen">
      <h2>Game Over!</h2>
      <p>Level Reached: <span id="finalLevel">0</span></p>
      <p>Best: <span id="finalBest">0</span></p>
      <button id="restartBtn">Play Again</button>
      <button id="menuBtn">Main Menu</button>
    </div>

    <div class="controls-info">
      Click the buttons or use keys: Q W A S
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
