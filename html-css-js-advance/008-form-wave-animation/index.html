<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Project 008: Form Wave Animation by KarthikCodingSolutions">
  <title>Form Wave | KarthikCodingSolutions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
</head>
<body>
  <main class="container">
    <div class="brand">
      <span class="logo" aria-hidden="true">⚡</span>
      <span>KarthikCodingSolutions</span>
    </div>
    <p class="subtitle">Project 008: Form Wave Animation</p>
    
    <h1>Login to KCS</h1>
    <form novalidate>
      <div class="form-control">
        <input type="email" id="email" required autocomplete="email" aria-describedby="email-error">
        <label for="email" aria-hidden="true">
          <span class="wave-text">Email</span>
        </label>
        <span class="error-msg" id="email-error"></span>
      </div>

      <div class="form-control">
        <input type="password" id="password" required autocomplete="current-password" aria-describedby="password-error">
        <label for="password" aria-hidden="true">
          <span class="wave-text">Password</span>
        </label>
        <button type="button" class="toggle-password" aria-label="Show password">
          <i class="fas fa-eye"></i>
        </button>
        <span class="error-msg" id="password-error"></span>
      </div>

      <button class="btn" type="submit">Login</button>

      <p class="text">Don't have an account? <a href="#">Register</a></p>
    </form>
  </main>

  <footer>
    <nav class="page-footer-nav" aria-label="Project navigation">
      <a href="../007-split-landing-page/index.html">&larr; Previous: Code 007</a>
      <a href="../../index.html">Home</a>

    </nav>

  </footer>

  <script src="script.js" defer></script>
</body>
</html>
