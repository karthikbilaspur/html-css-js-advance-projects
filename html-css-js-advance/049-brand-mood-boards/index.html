<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>049-brand-mood-board</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Quiz Screen -->
        <div class="screen active" id="quizScreen">
            <div class="header">
                <h1>Brand Mood Board Quiz</h1>
                <p>Answer 5 questions to generate your custom brand vibe</p>
                <div class="progress">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="step" id="stepCount">Question 1/5</div>
            </div>

            <div class="quiz-card" id="quizCard">
                <h2 id="quizQuestion"></h2>
                <div class="quiz-options" id="quizOptions"></div>
            </div>
        </div>

        <!-- Loading Screen -->
        <div class="screen" id="loadingScreen">
            <div class="loader-content">
                <div class="spinner"></div>
                <h2>Generating Your Mood Board...</h2>
                <p id="loadingText">Creating image 1 of 3</p>
            </div>
        </div>

        <!-- Result Screen -->
        <div class="screen" id="resultScreen">
            <div class="header">
                <h1>Your Brand Mood Board</h1>
                <p id="brandSummary"></p>
            </div>

            <div class="mood-board" id="moodBoard"></div>

            <div class="rating-section">
                <h3>Rate Your Brand Vibe</h3>
                <div class="star-rating" id="starRating">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <textarea id="reviewText" placeholder="Add a short review for your brand..."></textarea>
                <button class="btn" id="addToSliderBtn" disabled>Add to Testimonials</button>
            </div>

            <button class="btn btn-secondary" id="restartBtn">Start Over</button>
        </div>

        <!-- Testimonial Slider Screen -->
        <div class="screen" id="sliderScreen">
            <div class="header">
                <h1>Community Mood Boards</h1>
                <p>See what others created</p>
            </div>

            <div class="slider-container">
                <div class="slider-wrapper" id="sliderWrapper"></div>
                <button class="nav-btn prev" id="prevBtn">‹</button>
                <button class="nav-btn next" id="nextBtn">›</button>
            </div>

            <div class="dots" id="dots"></div>
            <button class="btn" id="createNewBtn">Create Your Own</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
