<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider + Typing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Slider Typing Challenge</h1>
            <div class="controls">
                <button id="mode-toggle">Mode: Slide</button>
                <button id="autoplay-toggle">Autoplay: Off</button>
            </div>
        </div>

        <div class="slider-wrapper">
            <div class="slider" id="slider"></div>
            <button class="nav prev" id="prev">&#10094;</button>
            <button class="nav next" id="next">&#10095;</button>
        </div>

        <div class="typing-game">
            <p>Type the caption to unlock next slide:</p>
            <div class="caption-target" id="caption-target"></div>
            <input type="text" id="typing-input" placeholder="Start typing here..." autocomplete="off">
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>

        <div class="thumbnails" id="thumbnails"></div>
        <div class="dots" id="dots"></div>

        <div class="stats">
            <span>Score: <b id="score">0</b></span>
            <span>WPM: <b id="wpm">0</b></span>
            <span>Accuracy: <b id="accuracy">100%</b></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
