<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Minesweeper - 089</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <h1>MINESWEEPER <span class="project-num">089</span></h1>

    <div class="controls">
      <div class="stat-box">
        <div class="label">MINES</div>
        <div class="value" id="minesCount">10</div>
      </div>
      <button id="resetBtn">😊</button>
      <div class="stat-box">
        <div class="label">TIME</div>
        <div class="value" id="timeCount">000</div>
      </div>
    </div>

    <div class="difficulty">
      <button class="diff-btn active" data-size="9" data-mines="10">Easy</button>
      <button class="diff-btn" data-size="16" data-mines="40">Medium</button>
      <button class="diff-btn" data-size="24" data-mines="99">Hard</button>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>

      <div class="overlay" id="gameOverScreen">
        <h2 id="gameOverText">Game Over!</h2>
        <p>Time: <span id="finalTime">0</span>s</p>
        <button id="playAgainBtn">Play Again</button>
      </div>
    </div>

    <div class="instructions">
      <p><strong>Left Click:</strong> Reveal | <strong>Right Click:</strong> Flag | <strong>Mobile:</strong> Tap = Reveal, Hold = Flag</p>
      <p>Numbers show adjacent mines. Clear all safe cells to win!</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
