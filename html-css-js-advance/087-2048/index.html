<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048 - 087</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <div class="header">
      <h1>2048 <span class="project-num">087</span></h1>
      <div class="scores">
        <div class="score-box">
          <div class="label">SCORE</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="label">BEST</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="newGameBtn">New Game</button>
      <button id="undoBtn">↶ Undo</button>
      <div class="level-box">
        <div class="label">LEVEL</div>
        <div class="value" id="level">1</div>
      </div>
      <div class="level-box">
        <div class="label">GOAL</div>
        <div class="value" id="goal">2048</div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>

      <div class="overlay" id="gameOverScreen">
        <h2 id="gameOverText">Game Over!</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <p>Reached Level: <span id="finalLevel">1</span></p>
        <button id="tryAgainBtn">Try Again</button>
      </div>

      <div class="overlay" id="winScreen">
        <h2>Level <span id="levelNum">2</span></h2>
        <p>You reached <span id="reachedGoal">2048</span>!</p>
        <p>Next goal: <span id="nextGoal">4096</span></p>
        <button id="keepPlayingBtn">Continue</button>
        <button id="newGameWinBtn">New Game</button>
      </div>
    </div>

    <div class="instructions">
      <p><strong>How to play:</strong> Use arrow keys or swipe to move tiles. Tiles with the same number merge! Reach the goal to level up.</p>
    </div>

    <div class="mobile-controls" id="mobileControls">
      <button class="control-btn" id="upBtn">▲</button>
      <div class="h-controls">
        <button class="control-btn" id="leftBtn">◀</button>
        <button class="control-btn" id="rightBtn">▶</button>
      </div>
      <button class="control-btn" id="downBtn">▼</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
