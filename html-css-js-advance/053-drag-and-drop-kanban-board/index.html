<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>053-drop-drag-kanban-touch-slider</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>📋 Stinky Kanban</h1>
            <p>Drag cards • Swipe columns • Tasks rot after 3 days</p>
            <button class="btn-add" id="addTaskBtn">+ New Task</button>
        </header>

        <!-- Touch Category Slider -->
        <div class="category-slider">
            <div class="slider-track" id="categorySlider">
                <button class="category-btn active" data-filter="all">All Tasks</button>
                <button class="category-btn" data-filter="todo">To Do</button>
                <button class="category-btn" data-filter="progress">In Progress</button>
                <button class="category-btn" data-filter="done">Done</button>
                <button class="category-btn" data-filter="stinky">Stinky 💀</button>
            </div>
        </div>

        <!-- Kanban Board -->
        <div class="kanban-board" id="kanbanBoard">
            <div class="column" data-status="todo">
                <div class="column-header">
                    <h3>To Do</h3>
                    <span class="count" id="todoCount">0</span>
                </div>
                <div class="column-body" id="todoColumn"></div>
            </div>

            <div class="column" data-status="progress">
                <div class="column-header">
                    <h3>In Progress</h3>
                    <span class="count" id="progressCount">0</span>
                </div>
                <div class="column-body" id="progressColumn"></div>
            </div>

            <div class="column" data-status="done">
                <div class="column-header">
                    <h3>Done</h3>
                    <span class="count" id="doneCount">0</span>
                </div>
                <div class="column-body" id="doneColumn"></div>
            </div>
        </div>

        <!-- Add Task Modal -->
        <div class="modal" id="taskModal">
            <div class="modal-content">
                <h2>Add New Task</h2>
                <input type="text" id="taskTitle" placeholder="Task title..." maxlength="50">
                <textarea id="taskDesc" placeholder="Description (optional)" maxlength="200"></textarea>
                <div class="modal-row">
                    <select id="taskPriority" title="priority"> Select the Priority
                        <option value="low">Low 🟢</option>
                        <option value="medium" selected>Medium 🟡</option>
                        <option value="high">High 🔴</option>
                    </select>
                    <select id="taskCategory"  title="cateory task"> Category Task 
                        <option value="general">General</option>
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button class="btn btn-primary" id="saveBtn">Add Task</button>
                </div>
            </div>
        </div>
    </div>
          <footer class="footer-wrap">
        <nav class="page-footer-nav" aria-label="Project navigation">

    </footer>
    <script src="script.js"></script>
</body>
</html>
