<body>
    <div class="container">
        <header class="header">
            <h1>Live User Filter</h1>
            <p class="subtitle">Search by name or location</p>

            <div class="search-wrapper">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="filter" placeholder="Search users..." autocomplete="off">
            </div>
        </header>

        <div class="stats">
            <span id="resultCount">Loading users...</span>
        </div>

        <ul id="result" class="user-list"></ul>

        <div class="loader" id="loader">
            <div class="spinner"></div>
        </div>
    </div>
