<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>031-password-generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Password Generator</h1>

        <div class="result-container">
            <input type="text" id="result" placeholder="Your password" readonly>
            <button class="btn" id="clipboard">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
        </div>

        <div class="settings">
            <div class="setting">
                <label for="length">Password Length</label>
                <div class="length-control">
                    <input type="range" id="length" min="4" max="32" value="16">
                    <span id="lengthValue">16</span>
                </div>
            </div>

            <div class="setting">
                <label for="uppercase">Include Uppercase</label>
                <input type="checkbox" id="uppercase" checked>
            </div>

            <div class="setting">
                <label for="lowercase">Include Lowercase</label>
                <input type="checkbox" id="lowercase" checked>
            </div>

            <div class="setting">
                <label for="numbers">Include Numbers</label>
                <input type="checkbox" id="numbers" checked>
            </div>

            <div class="setting">
                <label for="symbols">Include Symbols</label>
                <input type="checkbox" id="symbols" checked>
            </div>
        </div>

        <button class="btn btn-generate" id="generate">
            Generate Password
        </button>

        <div class="strength-meter">
            <div class="strength-bar" id="strengthBar"></div>
            <span class="strength-text" id="strengthText">Strength: Medium</span>
        </div>

        <div class="toast" id="toast">Copied to clipboard!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
