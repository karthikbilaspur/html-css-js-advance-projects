<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>033-notes-app</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>My Notes</h1>
            <div class="header-actions">
                <input type="text" id="searchInput" placeholder="Search notes..." class="search-input" aria-label="Search notes">
                <button class="btn btn-add" id="addBtn" aria-label="Add new note">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Note
                </button>
            </div>
        </header>

        <div class="notes-container" id="notesContainer">
            <!-- Notes will be injected here -->
        </div>

        <div class="empty-state" id="emptyState">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
            <h3 id="emptyTitle">No notes yet</h3>
            <p id="emptyText">Click "Add Note" to create your first note</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
