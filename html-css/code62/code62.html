<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 62 - Stats Cards</title>
  <link rel="stylesheet" href="code62.css">
  <!-- Using Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <main class="container">
    <h1>Dashboard Stats</h1>
    
    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon users">
          <i class="fas fa-users"></i>
        </div>
        <div class="stat-content">
          <h3 class="stat-value">12,428</h3>
          <p class="stat-label">Total Users</p>
          <span class="stat-change positive">+12% <i class="fas fa-arrow-up"></i></span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon revenue">
          <i class="fas fa-dollar-sign"></i>
        </div>
        <div class="stat-content">
          <h3 class="stat-value">$84,320</h3>
          <p class="stat-label">Revenue</p>
          <span class="stat-change positive">+8.2% <i class="fas fa-arrow-up"></i></span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon orders">
          <i class="fas fa-shopping-cart"></i>
        </div>
        <div class="stat-content">
          <h3 class="stat-value">1,203</h3>
          <p class="stat-label">New Orders</p>
          <span class="stat-change negative">-2.4% <i class="fas fa-arrow-down"></i></span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon bounce">
          <i class="fas fa-chart-line"></i>
        </div>
        <div class="stat-content">
          <h3 class="stat-value">24.5%</h3>
          <p class="stat-label">Bounce Rate</p>
          <span class="stat-change positive">-5.1% <i class="fas fa-arrow-down"></i></span>
        </div>
      </div>
    </section>
