<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinding Visualizer 85</title>
    <link rel="stylesheet" href="code85.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧭 A* Pathfinding Visualizer</h1>
            <p>Click and drag to draw walls. Click nodes to move them.</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <button id="start-btn" class="btn-primary">
                    <i class="fas fa-play"></i> Visualize A*
                </button>
                <button id="clear-path-btn" class="btn-secondary">
                    <i class="fas fa-eraser"></i> Clear Path
                </button>
                <button id="clear-walls-btn" class="btn-secondary">
                    <i class="fas fa-trash"></i> Clear Walls
                </button>
                <button id="random-maze-btn" class="btn-secondary">
                    <i class="fas fa-random"></i> Random Maze
                </button>
            </div>

            <div class="control-group">
                <label>Speed</label>
                <select id="speed" title="choose the speed of your choice"> Choose the speed of your convinience
                    <option value="100">Slow</option>
                    <option value="50" selected>Medium</option>
                    <option value="10">Fast</option>
                    <option value="0">Instant</option>
                </select>
            </div>

            <div class="control-group">
                <label>Algorithm</label>
                <select id="algorithm" title="choose any alog"> Choose Algorithim of your choice 
                    <option value="astar" selected>A* Search</option>
                    <option value="dijkstra">Dijkstra</option>
                    <option value="bfs">BFS</option>
                    <option value="dfs">DFS</option>
                </select>
            </div>

            <div class="control-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="diagonal">
                    <span>Allow Diagonal</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="weights">
                    <span>Weight Nodes</span>
                </label>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="node-sample start"></div>
                <span>Start</span>
            </div>
            <div class="legend-item">
                <div class="node-sample end"></div>
                <span>End</span>
            </div>
            <div class="legend-item">
                <div class="node-sample wall"></div>
                <span>Wall</span>
            </div>
            <div class="legend-item">
                <div class="node-sample weight"></div>
                <span>Weight (5x)</span>
            </div>
            <div class="legend-item">
                <div class="node-sample visited"></div>
                <span>Visited</span>
            </div>
            <div class="legend-item">
                <div class="node-sample path"></div>
                <span>Path</span>
            </div>
        </div>

        <div class="grid-wrapper">
            <div id="grid" class="grid"></div>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="label">Algorithm</span>
                <span id="algo-name">A* Search</span>
            </div>
            <div class="stat">
                <span class="label">Nodes Visited</span>
                <span id="nodes-visited">0</span>
            </div>
            <div class="stat">
                <span class="label">Path Length</span>
                <span id="path-length">—</span>
            </div>
            <div class="stat">
                <span class="label">Time</span>
                <span id="time-elapsed">0ms</span>
            </div>
        </div>
    </div>

    <script src="code85.js"></script>
     <footer>
        <nav class="page-footer-nav">
            <a href="../code84/code84.html">&larr; Previous: Code 84</a>
            <a href="../../index.html">Home</a>
            <a href="../code86/code86.html">Next: Code 86 &rarr;</a>
        </nav>
        <p class="credit">Built as part of HTML 100 Codes • Bangalore, India</p>
    </footer>

</body>
</html>
