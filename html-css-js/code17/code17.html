<body>
  <header>
    <h1>Code 17: Traffic Light</h1>
  </header>

  <div class="traffic-container">
    <div class="traffic-light">
      <div class="light red" id="redLight"></div>
      <div class="light yellow" id="yellowLight"></div>
      <div class="light green" id="greenLight"></div>
    </div>
    <p>Current: <span id="currentState">Red</span></p>
    <div class="btn-group">
      <button id="startBtn">Start Cycle</button>
      <button id="stopBtn">Stop</button>
    </div>
  </div>
