<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Toggle</title>
    <link rel="stylesheet" href="code05.css">
</head>
<body>
    <div class="container">  <!-- Add this wrapper -->
        <h1>Password Toggle</h1>
        
        <div class="form-group">
            <label for="passwordField">Password</label>
            <div class="password-wrapper">
                <input type="password" id="passwordField" placeholder="Enter your password" required>
                <button type="button" id="toggleBtn" aria-label="Toggle password visibility">
                    Show
                </button>
            </div>
        </div>

        <!-- Nav now inside .container -->
        <nav class="page-footer-nav">
          <p>
            <a href="../code04/code04.html">&larr; Previous: Code 4</a> 
            <a href="../../index.html">Home</a> 
            <a href="../code06/code06.html">Next: Code 6 &rarr;</a>
          </p>
        </nav>
    </div>  <!-- Close container here -->

    <script src="code05.js"></script>
</body>
</html>
