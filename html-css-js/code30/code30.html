<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 30: Number Guessing Game | HTML 100 Codes</title>
  <link rel="stylesheet" href="code30.css">
  <script src="code30.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 30: Number Guessing Game</h1>
    <p class="subtitle">Can you guess my number?</p>
  </header>

  <div class="game-container">
    <div class="difficulty-section">
      <h3>Select Difficulty</h3>
      <div class="difficulty-buttons">
        <button class="diff-btn active" data-max="10" data-attempts="5">Easy<br><span>1-10</span></button>
        <button class="diff-btn" data-max="50" data-attempts="7">Medium<br><span>1-50</span></button>
        <button class="diff-btn" data-max="100" data-attempts="10">Hard<br><span>1-100</span></button>
      </div>
    </div>

    <div class="game-info">
      <div class="info-card">
        <div class="info-label">Range</div>
        <div class="info-value" id="rangeDisplay">1 - 10</div>
      </div>
      <div class="info-card">
        <div class="info-label">Attempts</div>
        <div class="info-value"><span id="attemptsLeft">5</span> / <span id="maxAttempts">5</span></div>
      </div>
      <div class="info-card">
        <div class="info-label">Best Score</div>
        <div class="info-value" id="bestScore">-</div>
      </div>
    </div>

    <div class="game-area">
      <div class="hint-box" id="hintBox">
        <div class="hint-icon">🎯</div>
        <p id="hintText">I'm thinking of a number between 1 and 10...</p>
      </div>

      <div class="input-section">
        <input type="number" id="guessInput" placeholder="Enter your guess" min="1" max="10">
        <button id="guessBtn">Guess</button>
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="guess-history">
        <h4>Your Guesses</h4>
        <div id="guessList"></div>
      </div>
    </div>

    <button id="newGameBtn" class="new-game-btn">New Game</button>
  </div>

  <footer>
    <nav class="page-footer-nav">
      <a href="../code29/code29.html">&larr; Previous: Code 29</a>
      <a href="../../index.html">Home</a>
      <a href="../code31/code31.html">Next: Code 31 &rarr;</a>
    </nav>
  </footer>
</body>
</html>
