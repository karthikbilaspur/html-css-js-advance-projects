<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App 48</title>
    <link rel="stylesheet" href="code48.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Weather</h1>
            <button id="location-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                Use My Location
            </button>
        </header>

        <div class="search-box">
            <input type="text" id="city-input" placeholder="Search city...">
            <button id="search-btn">Search</button>
        </div>

        <div id="error" class="error hidden"></div>
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <div id="weather-card" class="weather-card hidden">
            <div class="location">
                <h2 id="city-name">--</h2>
                <p id="coordinates">--</p>
            </div>

            <div class="current">
                <div class="temp-main">
                    <span id="temperature">--</span>
                    <span class="unit">°C</span>
                </div>
                <div id="weather-icon" class="weather-icon">☀️</div>
                <p id="weather-desc">--</p>
            </div>

            <div class="details">
                <div class="detail-item">
                    <span class="label">Feels like</span>
                    <span id="feels-like">--°</span>
                </div>
                <div class="detail-item">
                    <span class="label">Humidity</span>
                    <span id="humidity">--%</span>
                </div>
                <div class="detail-item">
                    <span class="label">Wind</span>
                    <span id="wind-speed">-- km/h</span>
                </div>
                <div class="detail-item">
                    <span class="label">Pressure</span>
                    <span id="pressure">-- hPa</span>
                </div>
            </div>

            <div class="forecast">
                <h3>7-Day Forecast</h3>
                <div id="forecast-list"></div>
            </div>
        </div>
    </div>

    <script src="code48.js"></script>
</body>
</html>
