<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 19: BMI Calculator | HTML 100 Codes</title>
  <link rel="stylesheet" href="code19.css">
  <script src="code19.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 19: BMI Calculator</h1>
  </header>

  <div class="bmi-container">
    <div class="input-group">
      <label for="weight">Weight (kg)</label>
      <input type="number" id="weight" step="0.1" min="1" placeholder="e.g. 70" required>
    </div>

    <div class="input-group">
      <label for="height">Height (cm)</label>
      <input type="number" id="height" step="0.1" min="1" placeholder="e.g. 175" required>
    </div>

    <button id="calcBtn">Calculate BMI</button>

    <div class="result" id="resultBox">
      <p>Your BMI: <span id="bmiValue">--</span></p>
      <p>Category: <span id="bmiCategory">--</span></p>
    </div>
  </div>

  <footer>
    <nav class="page-footer-nav">
        <a href="../code18/code18.html">&larr; Previous: Code 18</a>
        <a href="../../index.html">Home</a>
        <a href="../code20/code20.html">Next: Code 20 &rarr;</a>
    </nav>
  </footer>
</body>
</html>
