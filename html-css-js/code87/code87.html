<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code87 Chess Board</title>
    <link rel="stylesheet" href="code87.css">
</head>
<body>
    <div class="container">
        <h1>Code87 Chess</h1>
        
        <div class="game-info">
            <div class="turn-indicator">
                Turn: <span id="current-turn">White</span>
            </div>
            <div class="status" id="game-status">Select a piece to move</div>
        </div>

        <div class="board-wrapper">
            <div class="ranks">
                <div>8</div><div>7</div><div>6</div><div>5</div>
                <div>4</div><div>3</div><div>2</div><div>1</div>
            </div>
            <div id="chess-board"></div>
        </div>
        
        <div class="files">
            <div>a</div><div>b</div><div>c</div><div>d</div>
            <div>e</div><div>f</div><div>g</div><div>h</div>
        </div>

        <div class="controls">
            <button id="reset-btn">New Game</button>
            <button id="undo-btn">Undo</button>
            <button id="flip-btn">Flip Board</button>
        </div>

        <div class="captured">
            <div class="captured-white">
                <span>Captured:</span>
                <div id="captured-white"></div>
            </div>
            <div class="captured-black">
                <span>Captured:</span>
                <div id="captured-black"></div>
            </div>
        </div>
    </div>

    <script src="code87.js"></script>
</body>
</html>
