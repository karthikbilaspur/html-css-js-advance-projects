<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App 44 Pro</title>
    <link rel="stylesheet" href="code44.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Notes</h2>
                <button id="new-note-btn">+ New</button>
            </div>
            <input type="text" id="search" placeholder="Search notes...">
            <div id="notes-list"></div>
        </aside>

        <main class="editor">
            <div class="editor-header">
                <input type="text" id="note-title" placeholder="Untitled Note" maxlength="100">
                <div class="editor-actions">
                    <input type="text" id="note-tags" placeholder="Add tags, comma separated">
                    <button id="delete-btn">Delete</button>
                </div>
            </div>

            <div id="note-content" contenteditable="true" placeholder="Start writing..."></div>

            <div class="editor-footer">
                <span id="save-status">Saved</span>
                <span id="note-meta"></span>
            </div>
        </main>
    </div>
      <footer>

</body>
</html>
