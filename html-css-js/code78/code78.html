<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player 78</title>
    <link rel="stylesheet" href="code78.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="player-card">
            <div class="album-art">
                <img id="cover" src="https://picsum.photos/400/400?random=1" alt="Album Cover">
                <div class="overlay-gradient"></div>
            </div>

            <div class="track-info">
                <h2 id="title">Select a track</h2>
                <p id="artist">No artist</p>
            </div>

            <div class="progress-container">
                <span id="current-time">0:00</span>
                <div class="progress-bar">
                    <div id="progress" class="progress"></div>
                    <input type="range" id="seek-bar" min="0" max="100" value="0" title="time-progress">Progresson of Time 
                </div>
                <span id="duration">0:00</span>
            </div>

            <div class="controls">
                <button id="shuffle-btn" title="Shuffle">
                    <i class="fas fa-random"></i>
                </button>
                <button id="prev-btn" title="Previous">
                    <i class="fas fa-backward"></i>
                </button>
                <button id="play-btn" class="play-btn" title="Play/Pause">
                    <i class="fas fa-play"></i>
                </button>
                <button id="next-btn" title="Next">
                    <i class="fas fa-forward"></i>
                </button>
                <button id="loop-btn" title="Loop">
                    <i class="fas fa-repeat"></i>
                </button>
            </div>

            <div class="volume-control">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume" min="0" max="100" value="70" title="volume"> 
                <i class="fas fa-volume-up"></i>
            </div>
        </div>

        <div class="playlist-card">
            <div class="playlist-header">
                <h3>Playlist</h3>
                <span id="track-count">0 tracks</span>
            </div>
            <div id="playlist" class="playlist"></div>
        </div>
    </div>

    <audio id="audio-player"></audio>
    <script src="code78.js"></script>
          <footer>
    <nav class="page-footer-nav">

      <a href="../code79/code79.html">Next: Code 79&rarr;</a>
    </nav>
    <p class="credit">Built as part of HTML 100 Codes • Bangalore, India</p>
  </footer>

</body>
</html>
