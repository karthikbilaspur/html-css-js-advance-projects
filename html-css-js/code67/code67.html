<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout Game 67</title>
    <link rel="stylesheet" href="code67.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Breakout</h1>
            <div class="stats">
                <div class="stat">
                    <span>Score</span>
                    <strong id="score">0</strong>
                </div>
                <div class="stat">
                    <span>Lives</span>
                    <strong id="lives">3</strong>
                </div>
                <div class="stat">
                    <span>Level</span>
                    <strong id="level">1</strong>
                </div>
            </div>
        </header>

        <canvas id="game-canvas" width="800" height="600"></canvas>

        <div class="controls">
            <button id="start-btn">Start Game</button>
            <button id="pause-btn" class="hidden">Pause</button>
            <p class="hint">Use ← → arrows or A/D to move • Space to launch</p>
        </div>

        <div id="game-over" class="modal">
            <div class="modal-content">
                <h2 id="game-over-title">Game Over</h2>
                <p id="game-over-text">Your score: 0</p>
                <button id="restart-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="code67.js"></script>
</body>
</html>
