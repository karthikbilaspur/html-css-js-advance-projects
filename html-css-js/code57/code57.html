<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener 57</title>
    <link rel="stylesheet" href="code57.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Link Shortener</h1>
            <p>Shorten long URLs instantly with shrtco.de API</p>
        </header>

        <div class="shortener-card">
            <div class="input-group">
                <input 
                    type="url" 
                    id="url-input" 
                    placeholder="Paste your long URL here... e.g. https://example.com/very/long/link"
                    autocomplete="off"
                >
                <button id="shorten-btn">Shorten</button>
            </div>

            <div id="error" class="error"></div>

            <div id="result" class="result">
                <div class="result-label">Your shortened link:</div>
                <div class="result-box">
                    <input type="text"  title = "Short-link" id="short-url" readonly>
                    <button id="copy-btn">Copy</button>
                </div>
                <div class="result-meta">
                    <span>Original: <a id="original-link" target="_blank"></a></span>
                </div>
            </div>
        </div>

        <div class="history">
            <div class="history-header">
                <h3>Recent Links</h3>
                <button id="clear-history">Clear All</button>
            </div>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

</body>
</html>
