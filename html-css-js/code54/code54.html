<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery 54</title>
    <link rel="stylesheet" href="code54.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Unsplash Gallery</h1>
            <p>Masonry layout with infinite scroll</p>
        </header>

        <div class="search-bar">
            <input 
                type="text" 
                id="search-input" 
                placeholder="Search photos... e.g. nature, city, food"
                autocomplete="off"
            >
            <button id="search-btn">Search</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-query="random">Featured</button>
            <button class="filter-btn" data-query="nature">Nature</button>
            <button class="filter-btn" data-query="architecture">Architecture</button>
            <button class="filter-btn" data-query="food">Food</button>
            <button class="filter-btn" data-query="travel">Travel</button>
            <button class="filter-btn" data-query="minimal">Minimal</button>
        </div>

        <div id="status"></div>
        <div id="masonry-grid" class="masonry"></div>
        <div id="loader" class="loader">Loading more...</div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-info">
            <p id="lightbox-author"></p>
            <a id="lightbox-link" target="_blank" rel="noopener">View on Unsplash</a>
        </div>
    </div>

    <script src="code54.js"></script>
</body>
</html>
