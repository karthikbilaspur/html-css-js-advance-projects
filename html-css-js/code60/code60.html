<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar UI 60</title>
    <link rel="stylesheet" href="code60.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Calendar</h1>
        </header>

        <div class="calendar">
            <div class="calendar-header">
                <button id="prev-month" class="nav-btn">‹</button>
                <h2 id="month-year"></h2>
                <button id="next-month" class="nav-btn">›</button>
            </div>

            <div class="calendar-weekdays">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>

            <div id="calendar-grid" class="calendar-grid"></div>
        </div>

        <div class="events-panel">
            <div class="events-header">
                <h3 id="selected-date">Select a date</h3>
                <button id="add-event-btn" class="hidden">+ Add Event</button>
            </div>
            <div id="events-list"></div>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div id="event-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Add Event</h3>
            <input type="text" id="event-title" placeholder="Event title...">
            <input type="time" id="event-time" title="add-events">
            <button id="save-event">Save Event</button>
        </div>
    </div>

    </nav>

  </footer>
    <script src="code60.js"></script>
</body>
</html>
