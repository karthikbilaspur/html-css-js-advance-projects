<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Calendar 61</title>
    <link rel="stylesheet" href="code61.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Event Calendar</h1>
            <p>Click a date to add events. Saved locally.</p>
        </header>

        <div class="calendar-card">
            <div class="calendar-header">
                <button id="prev-month">‹</button>
                <h2 id="month-year"></h2>
                <button id="next-month">›</button>
            </div>

            <div class="weekdays">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>

            <div id="calendar-grid" class="calendar-grid"></div>
        </div>

        <div class="legend">
            <span class="dot"></span> Has events
        </div>
    </div>

    <!-- Event Modal -->
    <div id="event-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modal-date"></h3>

            <div class="add-event-form">
                <input type="text" id="event-title" placeholder="Event title..." maxlength="50">
                <input type="time" id="event-time">
                <input type="color" id="event-color" value="#007aff">
                <button id="save-event">Add Event</button>
            </div>

            <div class="events-list">
                <h4>Events</h4>
                <div id="events-list"></div>
            </div>
        </div>
    </div>

    <script src="code61.js"></script>
</body>
</html>
