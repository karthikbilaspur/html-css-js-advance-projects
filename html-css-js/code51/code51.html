    <title>Recipe Finder 51</title>

</head>
<body>
    <div class="container">
        <header>
            <h1>Recipe Finder</h1>
            <p class="subtitle">Search 300+ meals from TheMealDB</p>
        </header>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search recipes... e.g. chicken, pasta, curry">
            <button id="search-btn">Search</button>
            <button id="random-btn">Surprise Me</button>
        </div>

        <div id="status"></div>
        <div id="results-grid"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>
