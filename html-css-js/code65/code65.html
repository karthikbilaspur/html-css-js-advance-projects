<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole 65</title>
    <link rel="stylesheet" href="code65.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Whack-a-Mole</h1>
            <p>Click the moles before they hide!</p>
        </header>

        <div class="stats">
            <div class="stat">
                <div class="label">Score</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="label">Time</div>
                <div class="value" id="timer">30</div>
            </div>
            <div class="stat">
                <div class="label">High Score</div>
                <div class="value" id="high-score">0</div>
            </div>
        </div>

        <div class="game-board" id="game-board">
            <div class="hole" data-hole="0"><div class="mole"></div></div>
            <div class="hole" data-hole="1"><div class="mole"></div></div>
            <div class="hole" data-hole="2"><div class="mole"></div></div>
            <div class="hole" data-hole="3"><div class="mole"></div></div>
            <div class="hole" data-hole="4"><div class="mole"></div></div>
            <div class="hole" data-hole="5"><div class="mole"></div></div>
            <div class="hole" data-hole="6"><div class="mole"></div></div>
            <div class="hole" data-hole="7"><div class="mole"></div></div>
            <div class="hole" data-hole="8"><div class="mole"></div></div>
        </div>

        <div class="controls">
            <button id="start-btn">Start Game</button>
            <button id="reset-btn">Reset</button>
        </div>

        <div id="game-over" class="game-over">
            <h2>Game Over!</h2>
            <p>Your Score: <span id="final-score">0</span></p>
            <p id="new-high-score" class="hidden">🎉 New High Score!</p>
            <button id="play-again">Play Again</button>
        </div>
    </div>

    <script src="code65.js"></script>
</body>
</html>
