<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 24: Countdown Timer Pro | HTML 100 Codes</title>
  <link rel="stylesheet" href="code24.css">
  <script src="code24.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 24: Countdown Timer Pro</h1>
  </header>

  <div class="timer-container">
    <input type="text" id="timerTitle" placeholder="Timer name..." value="Focus Timer">
    
    <div class="presets">
      <button class="preset-btn" data-min="1">1 min</button>
      <button class="preset-btn" data-min="5">5 min</button>
      <button class="preset-btn" data-min="10">10 min</button>
      <button class="preset-btn" data-min="25">Pomodoro</button>
    </div>

    <div class="input-section">
      <div class="time-input">
        <label for="hours">Hours</label>
        <input type="number" id="hours" min="0" max="23" value="0">
      </div>
      <div class="time-input">
        <label for="minutes">Minutes</label>
        <input type="number" id="minutes" min="0" max="59" value="5">
      </div>
      <div class="time-input">
        <label for="seconds">Seconds</label>
        <input type="number" id="seconds" min="0" max="59" value="0">
      </div>
    </div>

    <div class="progress-ring">
      <svg width="280" height="280">
        <circle class="progress-bg" cx="140" cy="140" r="120"/>
        <circle class="progress-bar" id="progressBar" cx="140" cy="140" r="120"/>
      </svg>
      <div class="display" id="display">05:00</div>
    </div>

    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="pauseBtn" disabled>Pause</button>
      <button id="resetBtn">Reset</button>
    </div>

    <p class="status" id="status">Ready</p>
  </div>

  <footer>
    <nav class="page-footer-nav">
      <a href="../code23/code23.html">&larr; Previous: Code 23</a>
      <a href="../../index.html">Home</a>
      <a href="../code25/code25.html">Next: Code 25 &rarr;</a>
    </nav>
  </footer>
</body>
</html>
