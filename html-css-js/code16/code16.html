  <header>
    <h1>Code 16: Coin Flip</h1>
  </header>

  <div class="coin-container">
    <div class="coin" id="coin">
      <div class="side heads">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/1d/US_One_Cent_Obv.png" alt="Heads">
      </div>
      <div class="side tails">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/US_One_Cent_Rev.png" alt="Tails">
      </div>
    </div>

    <p>Result: <span id="result">Heads</span></p>

    <button id="flipBtn">Flip Coin</button>
  </div>
