<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 32: Quiz App Pro | HTML 100 Codes</title>
  <link rel="stylesheet" href="code32.css">
  <script src="code32.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 32: Quiz App Pro</h1>
  </header>

  <div class="quiz-container">
    <div class="start-screen" id="startScreen">
      <h2>Ready to Test Your Knowledge?</h2>
      <div class="settings">
        <div class="setting-group">
          <label for="categorySelect">Category</label>
          <select id="categorySelect">
            <option value="all">All Categories</option>
            <option value="javascript">JavaScript</option>
            <option value="html">HTML & CSS</option>
            <option value="general">General Knowledge</option>
          </select>
        </div>
        <div class="setting-group">
          <label for="difficultySelect">Difficulty</label>
          <select id="difficultySelect">
            <option value="all">All Levels</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <div class="setting-group">
          <label for="questionCount">Questions</label>
          <select id="questionCount">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="15">15</option>
          </select>
        </div>
      </div>
      <button id="startBtn">Start Quiz</button>
      <div class="high-score">High Score: <span id="highScore">0</span>%</div>
    </div>

    <div class="quiz-screen" id="quizScreen">
      <div class="quiz-header">
        <div class="progress-info">
          <span id="questionCounter">Question 1/10</span>
          <span id="timer">00:00</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="question-card">
        <div class="question-meta">
          <span class="category-badge" id="categoryBadge"></span>
          <span class="difficulty-badge" id="difficultyBadge"></span>
        </div>
        <h3 id="questionText"></h3>
        <div class="options" id="optionsContainer"></div>
      </div>

      <div class="quiz-controls">
        <button id="prevBtn" disabled>Previous</button>
        <button id="nextBtn">Next</button>
        <button id="submitBtn">Submit Quiz</button>
      </div>
    </div>

    <div class="result-screen" id="resultScreen">
      <div class="result-icon" id="resultIcon"></div>
      <h2 id="resultTitle"></h2>
      <div class="score-circle">
        <svg width="150" height="150">
          <circle class="score-bg" cx="75" cy="75" r="65"/>
          <circle class="score-fill" id="scoreCircle" cx="75" cy="75" r="65"/>
        </svg>
        <div class="score-text">
          <span id="scorePercent">0%</span>
          <span id="scoreFraction">0/0</span>
        </div>
      </div>
      <div class="result-stats">
        <div class="stat">
          <span class="stat-value" id="correctCount">0</span>
          <span class="stat-label">Correct</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="wrongCount">0</span>
          <span class="stat-label">Wrong</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="timeTaken">00:00</span>
          <span class="stat-label">Time</span>
        </div>
      </div>
      <button id="reviewBtn">Review Answers</button>
      <button id="restartBtn">Take Another Quiz</button>
    </div>

    <div class="review-screen" id="reviewScreen">
      <h2>Review Answers</h2>
      <div id="reviewList"></div>
      <button id="backToResultBtn">Back to Results</button>
    </div>
  </div>
</body>
</html>
