<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 41: Speech to Text | HTML 100 Codes</title>
  <link rel="stylesheet" href="code41.css">
  <script src="code41.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 41: Speech to Text</h1>
    <p class="subtitle">Convert your voice to text instantly</p>
  </header>

  <div class="speech-container">
    <div class="controls">
      <div class="control-row">
        <div class="select-group">
          <label for="languageSelect">Language</label>
          <select id="languageSelect">
            <option value="en-US">English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="hi-IN">Hindi</option>
            <option value="es-ES">Spanish</option>
            <option value="fr-FR">French</option>
            <option value="de-DE">German</option>
            <option value="ja-JP">Japanese</option>
            <option value="zh-CN">Chinese</option>
          </select>
        </div>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="continuousCheck" checked>
            <span>Continuous</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="interimCheck" checked>
            <span>Interim Results</span>
          </label>
        </div>
      </div>

      <div class="mic-section">
        <button id="micBtn" class="mic-btn">
          <span class="mic-icon">🎤</span>
          <span class="mic-text">Start Listening</span>
        </button>
        <div class="status" id="status">Click mic to start</div>
        <div class="wave-animation" id="waveAnimation">
          <span></span><span></span>
        </div>
      </div>
    </div>

    <div class="output-section">
      <div class="output-header">
        <label>Transcription</label>
        <div class="output-actions">
          <span id="wordCount">0 words</span>
          <button id="copyBtn" class="action-btn">📋 Copy</button>
          <button id="clearBtn" class="action-btn">🗑️ Clear</button>
        </div>
      </div>
      <div class="output-box">
        <div id="finalText" class="final-text"></div>
        <div id="interimText" class="interim-text"></div>
      </div>
    </div>

    <div class="history-section">
      <h3>Saved Transcriptions <button id="saveBtn" class="save-btn">💾 Save Current</button></h3>
      <div id="historyList"></div>
    </div>

    <div class="info-box">
      <p><strong>Note:</strong> Works best in Chrome/Edge. Requires microphone permission.</p>
    </div>
  </div>
  <footer>
    <nav class="page-footer-nav">
      <a href="../code40/code40.html">&larr; Previous: Code 40</a>
      <a href="../../index.html">Home</a>
      <a href="../code42/code42.html">Next: Code 42 &rarr;</a>
    </nav>
    <p class="credit">Built as part of HTML 100 Codes • Bangalore, India</p>
  </footer>
</body>
</html>
