<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Generator 84</title>
    <link rel="stylesheet" href="code84.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌀 Maze Generator</h1>
            <p>Depth-First Search Algorithm</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label>Grid Size</label>
                <select id="grid-size" title="Select Grid Size">Select Grid Size
                    <option value="10">10 × 10</option>
                    <option value="20" selected>20 × 20</option>
                    <option value="30">30 × 30</option>
                    <option value="40">40 × 40</option>
                </select>
            </div>

            <div class="control-group">
                <label>Speed</label>
                <input type="range" id="speed" min="1" max="100" value="50" title="speed">Select the speed  
                <span id="speed-display">50ms</span>
            </div>

            <div class="control-group">
                <button id="generate-btn" class="btn-primary">
                    <i class="fas fa-magic"></i> Generate
                </button>
                <button id="solve-btn" class="btn-secondary" disabled>
                    <i class="fas fa-route"></i> Solve
                </button>
                <button id="clear-btn" class="btn-secondary">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>

            <div class="control-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="animate" checked>
                    <span>Animate</span>
                </label>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="maze-canvas"></canvas>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="label">Cells</span>
                <span id="cell-count">400</span>
            </div>
            <div class="stat">
                <span class="label">Steps</span>
                <span id="step-count">0</span>
            </div>
            <div class="stat">
                <span class="label">Path Length</span>
                <span id="path-length">—</span>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <span class="color-box"></span>
                <span>Wall</span>
            </div>
            <div class="legend-item">
                <span class="color-box"></span>
                <span>Current</span>
            </div>
            <div class="legend-item">
                <span class="color-box"></span>
                <span>Visited</span>
            </div>
            <div class="legend-item">
                <span class="color-box"></span>
                <span>Solution</span>
            </div>
        </div>
    </div>
        <footer>
        <nav class="page-footer-nav">
            <a href="../code83/code83.html">&larr; Previous: Code 83</a>
            <a href="../../index.html">Home</a>
            <a href="../code85/code85.html">Next: Code 85 &rarr;</a>
        </nav>
        <p class="credit">Built as part of HTML 100 Codes • Bangalore, India</p>
    </footer>

    <script src="code84.js"></script>
</body>
</html>
