<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code95 Video Player</title>
    <link rel="stylesheet" href="code95.css">
</head>
<body>
    <div class="container">
        <h1>Code95 Custom Player</h1>

        <div class="video-wrapper" id="video-wrapper">
            <video id="video" preload="metadata">
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>

            <div class="loading-overlay" id="loading">
                <div class="spinner"></div>
            </div>

            <div class="controls" id="controls">
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar">
                        <div class="progress-buffered" id="buffered"></div>
                        <div class="progress-played" id="played"></div>
                        <div class="progress-thumb" id="progress-thumb"></div>
                    </div>
                </div>

                <div class="controls-bottom">
                    <div class="controls-left">
                        <button class="control-btn" id="play-pause" title="Play/Pause (Space)">
                            <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <svg class="pause-icon hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>

                        <button class="control-btn" id="rewind" title="Rewind 10s">
                            <svg viewBox="0 0 24 24"><path d="M11.99 5V1l-5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                        </button>

                        <button class="control-btn" id="forward" title="Forward 10s">
                            <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
                        </button>

                        <div class="volume-container">
                            <button class="control-btn" id="mute" title="Mute (M)">
                                <svg class="volume-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                                <svg class="mute-icon hidden" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                            </button>
                            <input type="range" id="volume" min="0" max="1" step="0.1" value="1" class="volume-slider" title="volume">Volume 
                        </div>

                        <div class="time-display">
                            <span id="current-time">0:00</span>
                            <span>/</span>
                            <span id="duration">0:00</span>
                        </div>
                    </div>

                    <div class="controls-right">
                        <select id="playback-speed" class="speed-select" title="Playback Speed">
                            <option value="0.5">0.5x</option>
                            <option value="0.75">0.75x</option>
                            <option value="1" selected>1x</option>
                            <option value="1.25">1.25x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2">2x</option>
                        </select>

                        <button class="control-btn" id="pip" title="Picture in Picture">
                            <svg viewBox="0 0 24 24"><path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 1.98 2 1.98h18c1.1 0 2-.88 2-1.98V5c0-1.1-.9-2-2-2zm0 16.01H3V4.98h18v14.03z"/></svg>
                        </button>

                        <button class="control-btn" id="fullscreen" title="Fullscreen (F)">
                            <svg class="fs-enter" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                            <svg class="fs-exit hidden" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="video-info">
            <h3>Keyboard Shortcuts</h3>
            <div class="shortcuts">
                <div><kbd>Space</kbd> Play/Pause</div>
                <div><kbd>M</kbd> Mute</div>
                <div><kbd>F</kbd> Fullscreen</div>
                <div><kbd>←</kbd> Rewind 5s</div>
                <div><kbd>→</kbd> Forward 5s</div>
                <div><kbd>↑</kbd> Volume Up</div>
                <div><kbd>↓</kbd> Volume Down</div>
            </div>
        </div>
    </div>
      <footer>
        <nav class="page-footer-nav">
            <a href="../code94/code94.html">&larr; Previous: Code 94</a>
            <a href="../../index.html">Home</a>
            <a href="../code96/code96.html">Next: Code 96 &rarr;</a>
        </nav>
        <p class="credit">Built as part of HTML 100 Codes • Bangalore, India</p>
    </footer>
    <script src="code95.js"></script>
</body>
</html>
