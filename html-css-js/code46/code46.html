<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter 46</title>
    <link rel="stylesheet" href="code46.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Currency Converter</h1>
            <p class="subtitle">Live rates via exchangerate-api</p>
        </header>

        <section class="converter-card">
            <div class="input-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" value="1" min="0" step="0.01" placeholder="Enter amount">
            </div>

            <div class="currency-row">
                <div class="currency-select">
                    <label for="from-currency">From</label>
                    <select id="from-currency"></select>
                </div>

                <button id="swap-btn" type="button" title="Swap currencies" aria-label="Swap currencies">⇄</button>

                <div class="currency-select">
                    <label for="to-currency">To</label>
                    <select id="to-currency"></select>
                </div>
            </div>

            <button id="convert-btn" type="button">Convert</button>

            <div class="result">
                <div id="result-amount">-</div>
                <div id="rate-info">-</div>
            </div>

            <div class="status">
                <span id="last-updated">Fetching rates...</span>
            </div>
        </section>
    </main>

    <footer>
        <nav class="page-footer-nav">
            <a href="../code45/code45.html">&larr; Previous: Code 45</a>
            <a href="../../index.html">Home</a>
            <a href="../code47/code47.html">Next: Code 47 &rarr;</a>
        </nav>
        <p class="credit">Built as part of HTML 100 Codes • Bangalore, India</p>
    </footer>

    <script src="code46.js"></script>
</body>
</html>
