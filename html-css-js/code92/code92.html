<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code92 Infinite Scroll</title>
    <link rel="stylesheet" href="code92.css">
</head>
<body>
    <header class="header">
        <h1>Code92 Feed</h1>
        <div class="stats">
            Posts loaded: <span id="post-count">0</span>
        </div>
    </header>

    <main class="container">
        <div id="posts-container"></div>
        
        <div id="sentinel" class="sentinel">
            <div class="loader"></div>
            <p>Loading more posts...</p>
        </div>

        <div id="end-message" class="end-message hidden">
            <p>🎉 You've reached the end!</p>
            <button id="reset-btn">Load More</button>
        </div>
    </main>

    <button id="scroll-top" class="scroll-top hidden">↑</button>

    <script src="code92.js"></script>
</body>
</html>
