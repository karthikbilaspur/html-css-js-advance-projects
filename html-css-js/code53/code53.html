<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Info Cards 53</title>
    <link rel="stylesheet" href="code53.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Country Info Cards</h1>
            <p>Explore countries via REST Countries API</p>
        </header>

        <div class="controls">
            <input
                type="text"
                id="search-input"
                placeholder="Search for a country..."
            >
            <select id="region-filter"  title="select regions"> Please Select Regins 
                <option value="">All Regions</option>
                <option value="Africa">Africa</option>
                <option value="Americas">Americas</option>
                <option value="Asia">Asia</option>
                <option value="Europe">Europe</option>
                <option value="Oceania">Oceania</option>
            </select>
        </div>

        <div id="status"></div>
        <div id="countries-grid"></div>
    </div>

    <!-- Detail Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>
