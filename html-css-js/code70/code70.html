<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe 70</title>
    <link rel="stylesheet" href="code70.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tic Tac Toe</h1>
            <div class="score-board">
                <div class="player-score">
                    <div class="player-label">X</div>
                    <div class="score" id="score-x">0</div>
                </div>
                <div class="player-score">
                    <div class="player-label">Draws</div>
                    <div class="score" id="score-draw">0</div>
                </div>
                <div class="player-score">
                    <div class="player-label">O</div>
                    <div class="score" id="score-o">0</div>
                </div>
            </div>
        </header>

        <div class="game-status">
            <div id="status-text">Player X's turn</div>
        </div>

        <div class="game-board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button id="reset-btn">New Round</button>
            <button id="reset-scores">Reset Scores</button>
        </div>

        <div id="winner-modal" class="modal">
            <div class="modal-content">
                <h2 id="winner-text">Player X Wins!</h2>
                <button id="play-again">Play Again</button>
            </div>
        </div>
    </div>
       <footer>
    <nav class="page-footer-nav">
      <a href="../code69/code69.html">&larr; Previous: Code 69</a>
      <a href="../../index.html">Home</a>
      <a href="../code71/code71.html">Next: Code 71&rarr;</a>
    </nav>
    <p class="credit">Built as part of HTML 100 Codes • Bangalore, India</p>
  </footer>
    <script src="code70.js"></script>
</body>
</html>
