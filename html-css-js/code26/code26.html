<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 26: Alarm Clock | HTML 100 Codes</title>
  <link rel="stylesheet" href="code26.css">
  <script src="code26.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 26: Alarm Clock</h1>
  </header>

  <div class="clock-container">
    <div class="current-time">
      <div class="time-display" id="currentTime">00:00:00</div>
      <div class="date-display" id="currentDate">Monday, Jan 1</div>
    </div>

    <div class="alarm-section">
      <h3>Set Alarm</h3>
      <div class="alarm-inputs">
        <div class="time-input">
          <label for="alarmHour">Hour</label>
          <input type="number" id="alarmHour" min="1" max="12" value="7">
        </div>
        <div class="time-input">
          <label for="alarmMinute">Minute</label>
          <input type="number" id="alarmMinute" min="0" max="59" value="30">
        </div>
        <div class="time-input">
          <label for="ampm">AM/PM</label>
          <select id="ampm">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
          </select>
        </div>
      </div>

      <div class="sound-select">
        <label for="alarmSound">Alarm Sound</label>
        <select id="alarmSound">
          <option value="beep">Classic Beep</option>
          <option value="digital">Digital Alarm</option>
          <option value="chime">Soft Chime</option>
        </select>
      </div>

      <button id="setAlarmBtn">Set Alarm</button>
    </div>

    <div class="active-alarms" id="activeAlarms">
      <h3>Active Alarms</h3>
      <div id="alarmList"></div>
    </div>

    <div class="alarm-alert" id="alarmAlert">
      <div class="alert-content">
        <div class="alert-icon">⏰</div>
        <h2>Alarm!</h2>
        <p id="alertTime">07:30 AM</p>
        <div class="alert-buttons">
          <button id="snoozeBtn">Snooze 5 min</button>
          <button id="stopBtn">Stop</button>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <nav class="page-footer-nav">
      <a href="../code25/code25.html">&larr; Previous: Code 25</a>
      <a href="../../index.html">Home</a>
      <a href="../code27/code27.html">Next: Code 27 &rarr;</a>
    </nav>
  </footer>
</body>
</html>
