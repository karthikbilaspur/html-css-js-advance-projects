<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 34: Color Picker Tool | HTML 100 Codes</title>
  <link rel="stylesheet" href="code34.css">
  <script src="code34.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 34: Color Picker Tool</h1>
    <p class="subtitle">Pick, convert, and save colors</p>
  </header>

  <div class="picker-container">
    <div class="color-display">
      <div class="color-preview" id="colorPreview"></div>
      <div class="color-values">
        <div class="value-group">
          <label>HEX</label>
          <div class="input-row">
            <input type="text" id="hexInput" value="#667eea" title="HEX">
            <button class="copy-btn" data-target="hexInput">📋</button>
          </div>
        </div>
        <div class="value-group">
          <label>RGB</label>
          <div class="input-row">
            <input type="text" id="rgbInput" value="rgb(102, 126, 234)"  title="RGB">
            <button class="copy-btn" data-target="rgbInput">📋</button>
          </div>
        <div class="value-group">
          <label>HSL</label>
          <div class="input-row">
            <input type="text" id="hslInput" value="hsl(229, 76%, 66%)"  title="HSL">
            <button class="copy-btn" data-target="hslInput">📋</button>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="native-picker">
        <label for="colorInput">Native Picker</label>
        <input type="color" id="colorInput" value="#667eea">
      </div>

      <div class="sliders">
        <div class="slider-group">
          <label>R: <span id="rValue">102</span></label>
          <input type="range" id="rSlider" min="0" max="255" value="102"  title="R">
        </div>
        <div class="slider-group">
          <label>G: <span id="gValue">126</span></label>
          <input type="range" id="gSlider" min="0" max="255" value="126"  title="G">
        </div>
        <div class="slider-group">
          <label>B: <span id="bValue">234</span></label>
          <input type="range" id="bSlider" min="0" max="255" value="234"  title="B">
        </div>
      </div>
    </div>

    <div class="palette-section">
      <h3>Quick Colors</h3>
      <div class="palette-grid" id="paletteGrid"></div>
    </div>

    <div class="saved-section">
      <h3>Saved Colors <button id="saveBtn" class="save-btn">+ Save Current</button></h3>
      <div id="savedColors"></div>
    </div>
  </div>
     <footer>
    <nav class="page-footer-nav">
      <a href="../code33/code33.html">&larr; Previous: Code 33</a>
      <a href="../../index.html">Home</a>
      <a href="../code35/code35.html">Next: Code 35 &rarr;</a>
    </nav>
  </footer>
</body>
</html>
