<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List v1 - Code42</title>
  <link rel="stylesheet" href="code42.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Todo List v1</h1>
      <p class="subtitle">Built with createElement & appendChild</p>
    </header>

    <div class="todo-input">
      <input type="text" id="todoInput" placeholder="Add a new task..." maxlength="100">
      <input type="date" id="dateInput" title="Due date">
      <button id="addBtn">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All <span id="allCount">0</span></button>
      <button class="filter-btn" data-filter="active">Active <span id="activeCount">0</span></button>
      <button class="filter-btn" data-filter="completed">Completed <span id="completedCount">0</span></button>
    </div>

    <ul id="todoList" class="todo-list"></ul>

    <div class="footer">
      <button id="clearCompleted">Clear Completed</button>
      <span id="itemsLeft">0 items left</span>
    </div>
  </div>

  <script src="code42.js"></script>
</body>
</html>
