<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 36: CSS Box Shadow Generator | HTML 100 Codes</title>
  <link rel="stylesheet" href="code36.css">
  <script src="code36.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 36: CSS Box Shadow Generator</h1>
    <p class="subtitle">Create perfect shadows visually</p>
  </header>

  <div class="generator-container">
    <div class="preview-section">
      <div class="preview-box" id="previewBox">
        <div class="preview-element" id="previewElement">Preview</div>
      </div>
      <div class="css-output">
        <label>CSS Code</label>
        <div class="code-box">
          <code id="cssCode">box-shadow: 10px 10px 20px 0px rgba(0,0,0,0.3);</code>
          <button id="copyBtn" class="copy-btn">📋 Copy</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>Horizontal Offset: <span id="hOffsetValue">10px</span></label>
        <input type="range" id="hOffset" min="-100" max="100" value="10" title="Horizontal Offset">
      </div>

      <div class="control-group">
        <label>Vertical Offset: <span id="vOffsetValue">10px</span></label>
        <input type="range" id="vOffset" min="-100" max="100" value="10"  title="Vertical Offset">
      </div>

      <div class="control-group">
        <label>Blur Radius: <span id="blurValue">20px</span></label>
        <input type="range" id="blur" min="0" max="100" value="20"  title="Blue Radius">
      </div>

      <div class="control-group">
        <label>Spread Radius: <span id="spreadValue">0px</span></label>
        <input type="range" id="spread" min="-50" max="100" value="0"  title="Spread Radius">
      </div>

      <div class="control-row">
        <div class="control-group">
          <label>Shadow Color</label>
          <input type="color" id="shadowColor" value="#000000"  title="Shadow Color">
        </div>
        <div class="control-group">
          <label>Opacity: <span id="opacityValue">30%</span></label>
          <input type="range" id="opacity" min="0" max="100" value="30"  title="Opacity">
        </div>
      </div>

      <div class="control-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="insetCheck">
          <span>Inset Shadow</span>
        </label>
      </div>

      <button id="addLayerBtn" class="secondary-btn">+ Add Shadow Layer</button>
    </div>

    <div class="layers-section" id="layersSection">
      <h3>Shadow Layers</h3>
      <div id="layersList"></div>
    </div>

    <div class="presets-section">
      <h3>Presets</h3>
      <div class="preset-grid" id="presetGrid"></div>
    </div>
  </div>
    <footer>
    <nav class="page-footer-nav">
      <a href="../code35/code35.html">&larr; Previous: Code 35</a>
      <a href="../../index.html">Home</a>
      <a href="../code37/code37.html">Next: Code 37 &rarr;</a>
    </nav>
  </footer>
</body>
</html>
