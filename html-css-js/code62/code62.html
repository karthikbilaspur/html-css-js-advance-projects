<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Clock 62</title>
    <link rel="stylesheet" href="code62.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Analog Clock</h1>
            <p>Real-time with smooth animations</p>
        </header>

        <div class="clock-wrapper">
            <div class="clock">
                <div class="clock-face">
                    <!-- Hour markers -->
                    <div class="marker marker-12"></div>
                    <div class="marker marker-3"></div>
                    <div class="marker marker-6"></div>
                    <div class="marker marker-9"></div>
                    
                    <!-- Numbers -->
                    <div class="number number-12">12</div>
                    <div class="number number-3">3</div>
                    <div class="number number-6">6</div>
                    <div class="number number-9">9</div>

                    <!-- Hands -->
                    <div class="hand hour-hand" id="hour-hand"></div>
                    <div class="hand minute-hand" id="minute-hand"></div>
                    <div class="hand second-hand" id="second-hand"></div>
                    
                    <!-- Center dot -->
                    <div class="center-dot"></div>
                </div>
            </div>

            <div class="digital-time">
                <div id="time-display">00:00:00</div>
                <div id="date-display">Monday, January 1</div>
            </div>

            <div class="controls">
                <button id="toggle-smooth">Smooth Seconds: ON</button>
                <button id="toggle-24h">24H Format: OFF</button>
            </div>
        </div>
    </div>

    <script src="code62.js"></script>
</body>
</html>
