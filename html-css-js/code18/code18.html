<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 18: Basic Form Validation | HTML 100 Codes</title>
  <link rel="stylesheet" href="code18.css">
  <script src="code18.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 18: Basic Form Validation</h1>
  </header>

  <div class="form-container">
    <form id="signupForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
        <span class="error" id="usernameError"></span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <span class="error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
        <span class="error" id="passwordError"></span>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required>
        <span class="error" id="phoneError"></span>
      </div>

      <button type="submit">Sign Up</button>
      <p class="success" id="successMsg"></p>
    </form>
  </div>

  <footer>
    <nav class="page-footer-nav">
        <a href="../code17/code17.html">&larr; Previous: Code 17</a>
        <a href="../../index.html">Home</a>
        <a href="../code19/code19.html">Next: Code 19 &rarr;</a>
    </nav>
  </footer>
</body>
</html>
