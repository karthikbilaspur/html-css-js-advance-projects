<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 28: Password Generator | HTML 100 Codes</title>
  <link rel="stylesheet" href="code28.css">
  <script src="code28.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 28: Password Generator</h1>
  </header>

  <div class="generator-container">
    <div class="output-box">
      <input type="text" id="passwordOutput" readonly placeholder="Click Generate">
      <button id="copyBtn" title="Copy to clipboard">📋</button>
    </div>

    <div class="strength-meter">
      <div class="strength-bar" id="strengthBar"></div>
      <span id="strengthText">Strength: -</span>
    </div>

    <div class="settings">
      <div class="length-group">
        <div class="label-row">
          <label for="lengthRange">Password Length</label>
          <span id="lengthValue">16</span>
        </div>
        <input type="range" id="lengthRange" min="4" max="64" value="16">
      </div>

      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="uppercase" checked>
          <span class="checkmark"></span>
          Include Uppercase (A-Z)
        </label>

        <label class="checkbox-label">
          <input type="checkbox" id="lowercase" checked>
          <span class="checkmark"></span>
          Include Lowercase (a-z)
        </label>

        <label class="checkbox-label">
          <input type="checkbox" id="numbers" checked>
          <span class="checkmark"></span>
          Include Numbers (0-9)
        </label>

        <label class="checkbox-label">
          <input type="checkbox" id="symbols" checked>
          <span class="checkmark"></span>
          Include Symbols (!@#$%)
        </label>

        <label class="checkbox-label">
          <input type="checkbox" id="excludeSimilar">
          <span class="checkmark"></span>
          Exclude Similar (i, l, 1, L, o, 0, O)
        </label>
      </div>
    </div>

    <button id="generateBtn">Generate Password</button>
    <p class="info" id="infoText"></p>
  </div>
</body>
</html>
