<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Character Counter</title>
    <link rel="stylesheet" href="code04.css"> 
</head>
<body>
    <div class="container">
        <h1>Live Character Counter</h1>
        
        <div class="input-group">
            <textarea 
                id="textInput" 
                placeholder="Start typing here and watch the counter update in real time..."
                maxlength="200"
            ></textarea>
        </div>

        <div class="counter-wrapper">
            <p id="charCount" class="safe">Characters: 0</p>
            <span class="limit-text">Max: 200 characters</span>
        </div>

        <div class="tip">
            💡 Try typing to see the counter change colors as you approach the limit!
        </div>

        <!-- Pagination goes here, inside .container -->
        <nav class="page-footer-nav">
          <p>
            <a href="../code03/code03.html">&larr; Previous: Code 3</a> 
            <a href="../../index.html">Home</a> 
            <a href="../code05/code05.html">Next: Code 5 &rarr;</a>
          </p>
        </nav>
    </div>
    
    <script src="code04.js"></script>
</body>
</html>
