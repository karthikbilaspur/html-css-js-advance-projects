<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe AI 71</title>
    <link rel="stylesheet" href="code71.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tic Tac Toe AI</h1>
            <div class="difficulty">
                <label>AI Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard" selected>Hard (Unbeatable)</option>
                </select>
            </div>
        </header>

        <div class="stats">
            <div class="stat">
                <div class="label">You (X)</div>
                <div class="score" id="score-player">0</div>
            </div>
            <div class="stat">
                <div class="label">Draws</div>
                <div class="score" id="score-draw">0</div>
            </div>
            <div class="stat">
                <div class="label">AI (O)</div>
                <div class="score" id="score-ai">0</div>
            </div>
        </div>

        <div class="game-status" id="status">Your turn - You are X</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button id="new-game">New Game</button>
            <button id="reset-scores">Reset Scores</button>
        </div>

        <div class="ai-thinking" id="ai-thinking">
            <span>AI is thinking...</span>
            <div class="dots"><span></span><span></span></div>
        </div>
    </div>

    <script src="code71.js"></script>
</body>
</html>
