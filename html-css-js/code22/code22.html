<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 22: Temperature Converter | HTML 100 Codes</title>
  <link rel="stylesheet" href="code22.css">
  <script src="code22.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 22: Temperature Converter</h1>
  </header>

  <div class="converter-container">
    <div class="input-section">
      <label for="tempInput">Enter Temperature</label>
      <input type="number" id="tempInput" step="0.01" placeholder="0" value="0">

      <label for="fromUnit">From</label>
      <select id="fromUnit">
        <option value="celsius">Celsius (°C)</option>
        <option value="fahrenheit">Fahrenheit (°F)</option>
        <option value="kelvin">Kelvin (K)</option>
      </select>
    </div>

    <div class="swap-btn">
      <button id="swapBtn">⇅ Swap</button>
    </div>

    <div class="input-section">
      <label for="toUnit">To</label>
      <select id="toUnit">
        <option value="celsius">Celsius (°C)</option>
        <option value="fahrenheit" selected>Fahrenheit (°F)</option>
        <option value="kelvin">Kelvin (K)</option>
      </select>
    </div>

    <div class="result">
      <p>Result: <span id="resultValue">32.00</span> <span id="resultUnit">°F</span></p>
    </div>

    <div class="formula">
      <p id="formulaText">°F = (°C × 9/5) + 32</p>
    </div>
  </div>
</body>
</html>
