<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code93 Virtual Scroll</title>
    <link rel="stylesheet" href="code93.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Code93 Virtual Scroll List</h1>
            <div class="controls">
                <div class="control-group">
                    <label>Total Items:</label>
                    <input type="number" id="item-count" value="100000" min="100" max="1000000">
                    <button id="generate-btn">Generate</button>
                </div>
                <div class="control-group">
                    <label>Item Height:</label>
                    <select id="item-height">
                        <option value="40">40px - Compact</option>
                        <option value="60" selected>60px - Default</option>
                        <option value="80">80px - Large</option>
                        <option value="variable">Variable Height</option>
                    </select>
                </div>
                <div class="control-group">
                    <button id="scroll-top">Top</button>
                    <button id="scroll-random">Random</button>
                    <button id="scroll-bottom">Bottom</button>
                </div>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">Rendered:</span>
                <span class="stat-value" id="rendered-count">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Total:</span>
                <span class="stat-value" id="total-count">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Scroll:</span>
                <span class="stat-value" id="scroll-pos">0px</span>
            </div>
            <div class="stat">
                <span class="stat-label">FPS:</span>
                <span class="stat-value" id="fps">60</span>
            </div>
            <div class="stat">
                <span class="stat-label">Memory Saved:</span>
                <span class="stat-value" id="memory-saved">0%</span>
            </div>
        </div>

        <div class="viewport" id="viewport">
            <div class="scroll-content" id="scroll-content">
                <div class="visible-items" id="visible-items"></div>
            </div>
        </div>

        <div class="footer">
            <div id="debug-info">Ready - Only visible DOM nodes rendered</div>
        </div>
    </div>

    <script src="code93.js"></script>
</body>
</html>
