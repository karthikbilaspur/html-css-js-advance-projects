<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code86 Sudoku Generator</title>
    <link rel="stylesheet" href="code86.css">
</head>
<body>
    <div class="container">
        <h1>Code86 Sudoku</h1>
        
        <div class="controls">
            <div class="difficulty-selector">
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy - 36 clues</option>
                    <option value="medium">Medium - 30 clues</option>
                    <option value="hard">Hard - 26 clues</option>
                    <option value="expert">Expert - 22 clues</option>
                    <option value="evil">Evil - 17 clues</option>
                </select>
            </div>
            
            <div class="buttons">
                <button id="new-game">New Game</button>
                <button id="check-solution">Check</button>
                <button id="solve">Solve</button>
                <button id="hint">Hint</button>
                <button id="reset">Reset</button>
            </div>
        </div>

        <div class="game-info">
            <div class="timer">Time: <span id="time">00:00</span></div>
            <div class="mistakes">Mistakes: <span id="mistakes">0</span>/3</div>
            <div id="message"></div>
        </div>

        <div id="sudoku-board"></div>

        <div class="number-pad">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn erase" data-num="0">✕</button>
        </div>
    </div>

    <script src="code86.js"></script>
     <footer>
        <nav class="page-footer-nav">
            <a href="../code85/code85.html">&larr; Previous: Code 85</a>
            <a href="../../index.html">Home</a>
            <a href="../code87/code87.html">Next: Code 87 &rarr;</a>
        </nav>
        <p class="credit">Built as part of HTML 100 Codes • Bangalore, India</p>
    </footer>

</body>
</html>
