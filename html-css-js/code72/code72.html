<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test 72</title>
    <link rel="stylesheet" href="code72.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Typing Speed Test</h1>
            <p>Test your typing speed and accuracy</p>
        </header>

        <div class="stats">
            <div class="stat">
                <div class="label">Time</div>
                <div class="value" id="timer">60</div>
            </div>
            <div class="stat">
                <div class="label">WPM</div>
                <div class="value" id="wpm">0</div>
            </div>
            <div class="stat">
                <div class="label">Accuracy</div>
                <div class="value" id="accuracy">100%</div>
            </div>
            <div class="stat">
                <div class="label">CPM</div>
                <div class="value" id="cpm">0</div>
            </div>
        </div>

        <div class="test-area">
            <div id="words-display" class="words-display"></div>
            <input type="text" id="input-field" class="input-field" placeholder="Start typing here..." autocomplete="off" autocorrect="off" spellcheck="false">
        </div>

        <div class="controls">
            <select id="time-select" title="select the timings"> Select the Timings
                <option value="15">15 seconds</option>
                <option value="30">30 seconds</option>
                <option value="60" selected>60 seconds</option>
                <option value="120">120 seconds</option>
            </select>
            <select id="difficulty" title="select the difficulty">Select the difficulty
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
            <button id="reset-btn">New Test</button>
        </div>

        <div id="results" class="results hidden">
            <h2>Test Complete!</h2>
            <div class="results-grid">
                <div class="result-item">
                    <div class="result-label">WPM</div>
                    <div class="result-value" id="final-wpm">0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Accuracy</div>
                    <div class="result-value" id="final-accuracy">0%</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Characters</div>
                    <div class="result-value" id="final-chars">0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Correct</div>
                    <div class="result-value" id="final-correct">0</div>
                </div>
            </div>
            <button id="retry-btn">Try Again</button>
        </div>
    </div>
            <footer>
    <nav class="page-footer-nav">
      <a href="../code71/code71.html">&larr; Previous: Code 71</a>
      <a href="../../index.html">Home</a>
      <a href="../code73/code73.html">Next: Code 73&rarr;</a>
    </nav>
    <p class="credit">Built as part of HTML 100 Codes • Bangalore, India</p>
  </footer>
    <script src="code72.js"></script>
</body>
</html>
