<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 38: Unit Converter | HTML 100 Codes</title>
  <link rel="stylesheet" href="code38.css">
  <script src="code38.js" defer></script>
</head>
<body>
  <header>
    <h1>Code 38: Unit Converter</h1>
    <p class="subtitle">Convert anything to anything</p>
  </header>

  <div class="converter-container">
    <div class="category-tabs">
      <button class="tab-btn active" data-category="length">Length</button>
      <button class="tab-btn" data-category="weight">Weight</button>
      <button class="tab-btn" data-category="temperature">Temperature</button>
      <button class="tab-btn" data-category="volume">Volume</button>
      <button class="tab-btn" data-category="speed">Speed</button>
      <button class="tab-btn" data-category="area">Area</button>
    </div>

    <div class="converter-box">
      <div class="input-section">
        <label>From</label>
        <input type="number" id="fromValue" value="1" step="any" placeholder="number">
        <select id="fromUnit" class="unit-select" title="Form"></select>
      </div>

      <button id="swapBtn" class="swap-btn" title="Swap units">⇄</button>

      <div class="input-section">
        <label>To</label>
        <input type="number" id="toValue" placeholder="To">
        <select id="toUnit" class="unit-select" title="To"></select>
      </div>
    </div>

    <div class="formula-box">
      <p id="formulaText">1 meter = 100 centimeters</p>
    </div>

    <div class="quick-conversions">
      <h3>Common Conversions</h3>
      <div id="quickGrid" class="quick-grid"></div>
    </div>

    <div class="history-section">
      <h3>Recent Conversions <button id="clearHistory">Clear</button></h3>
      <div id="historyList"></div>
    </div>
  </div>
    <footer>
    <nav class="page-footer-nav">
      <a href="../code37/code37.html">&larr; Previous: Code 37</a>
      <a href="../../index.html">Home</a>
      <a href="../code39/code39.html">Next: Code 39 &rarr;</a>
    </nav>
  </footer>
</body>
</html>
